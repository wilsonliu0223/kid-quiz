            ctx.globalAlpha = 0.12 + i * 0.1;
            ctx.fillStyle = isShard ? "#ff9040" : COLORS.bulletEdge;
            ctx.beginPath();
            ctx.arc(t.x, t.y, b.r * 0.65, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          if (isShard) {
            const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
            grd.addColorStop(0, "#fff");
            grd.addColorStop(0.4, "#ffe080");
            grd.addColorStop(1, "#ff6020");
            ctx.fillStyle = grd;
            ctx.shadowColor = "#ffb830";
            ctx.shadowBlur = 10;
          } else {
            ctx.fillStyle = COLORS.bullet;
            ctx.shadowColor = COLORS.bulletEdge;
            ctx.shadowBlur = 6;
          }
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        for (const eb of enemyBullets) {
          if (eb.glow) {
            const grd = ctx.createRadialGradient(eb.x, eb.y, 0, eb.x, eb.y, eb.r * 2);
            grd.addColorStop(0, "#fff");
            grd.addColorStop(0.35, "#ff80c0");
            grd.addColorStop(1, "#ff2060");
            ctx.fillStyle = grd;
            ctx.shadowColor = "#ff6eb4";
            ctx.shadowBlur = 12;
          } else {
            ctx.fillStyle = COLORS.eBullet;
            ctx.shadowColor = "#ff6eb4";
            ctx.shadowBlur = 6;
          }
          ctx.beginPath();
          ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI * 2);
          ctx.fill();
          if (eb.glow) {
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(eb.x, eb.y, eb.r + 2, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.shadowBlur = 0;
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life * 2);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawPowerOrbs() {
        for (const orb of powerOrbs) {
          const def = PICKUP[orb.type];
          const pulse = 0.75 + Math.sin(time * 8 + orb.wobble) * 0.25;
          ctx.save();
          ctx.translate(orb.x, orb.y);
          const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 14 * pulse);
          grd.addColorStop(0, "#fff");
          grd.addColorStop(0.35, def.color);
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.shadowColor = def.glow;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(0, 0, 11 * pulse, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#1a2030";
          ctx.font = "bold 11px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(def.label, 0, 1);
          ctx.restore();
        }
      }

      function drawUltAura() {
        if (ultActiveT <= 0) return;
        ctx.strokeStyle = `rgba(255, 213, 74, ${0.25 + (ultActiveT % 0.4) * 0.5})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 21 + Math.sin(time * 20) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        drawBg();

        if (victorySeq) {
          drawParticles();
          drawPlayer();
          if (flash > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flash * 2.8})`;
            ctx.fillRect(0, 0, W, H);
          }
          drawVictory();
          return;
        }

        drawTelegraphs();
        drawEnemies();
        drawPowerOrbs();
        for (const orb of bombOrbs) {
          if (orb.active) drawBombOrb(orb);
        }
        drawBullets();
        drawMissileLaserTracks();
        drawPlayerLaser();
        drawParticles();
        drawPlayer();
        drawShieldBubble();
        drawUltAura();
        if (flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flash * (victorySeq ? 2.8 : 4)})`;
          ctx.fillRect(0, victorySeq ? 0 : zoneY.mid, W, victorySeq ? H : zoneY.bot - zoneY.mid);
        }
        drawVictory();
      }

      let last = 0;
      function loop(ts) {
        const dt = Math.min(0.033, (ts - last) / 1000 || 0);
        last = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function pointerToGame(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * W,
          y: ((clientY - rect.top) / rect.height) * H,
        };
      }

      function inPlayerZone(y) {
        return y >= zoneY.bot + 4 && y <= zoneY.botEnd - 4;
      }

      function canStartDrag(y, pointerType) {
        if (inPlayerZone(y)) return true;
        if (pointerType !== "mouse" && y >= zoneY.bot - 12 && y <= zoneY.botEnd) return true;
        return false;
      }

      function movePlayerTo(x, y) {
        player.x = x;
        player.y = y;
        clampPlayer();
      }

      function onDragStart(e, x, y) {
        if (!running || gameOver || victorySeq) return;
        if (!canStartDrag(y, e.pointerType || "mouse")) return;
        if (player.dragId != null && player.dragId !== e.pointerId) {
          player.dragging = false;
          player.dragId = null;
          document.getElementById("game-wrap").classList.remove("dragging");
        }
        if (player.dragId != null) return;
        player.dragging = true;
        player.dragId = e.pointerId;
        player.pointerType = e.pointerType || "mouse";
        try {
          canvas.setPointerCapture(e.pointerId);
        } catch (_) {}
        movePlayerTo(x, y);
        document.getElementById("game-wrap").classList.add("dragging");
      }

      function onDragMove(e, x, y) {
        if (!player.dragging || player.dragId !== e.pointerId) return;
        if (player.pointerType === "mouse" && !inPlayerZone(y)) {
          movePlayerTo(x, Math.min(y, zoneY.botEnd - 8));
          return;
        }
        movePlayerTo(x, y);
      }

      function onDragEnd(e) {
        if (player.dragId !== e.pointerId) return;
        player.dragging = false;
        player.dragId = null;
        document.getElementById("game-wrap").classList.remove("dragging");
        try {
          if (canvas.hasPointerCapture(e.pointerId)) {
            canvas.releasePointerCapture(e.pointerId);
          }
        } catch (_) {}
      }

      function bindHudTap(btn, handler) {
        let touchFired = false;
        btn.addEventListener("pointerdown", (e) => {
          if (btn.disabled) return;
          if (e.pointerType === "mouse") return;
          e.preventDefault();
          e.stopPropagation();
          touchFired = true;
          handler();
        });
        btn.addEventListener("click", (e) => {
          if (touchFired) {
            touchFired = false;
            e.preventDefault();
            return;
          }
          if (btn.disabled) return;
          handler();
        });
      }

      canvas.addEventListener(
        "pointerdown",
        (e) => {
          if (e.button !== 0 && e.pointerType === "mouse") return;
          const p = pointerToGame(e.clientX, e.clientY);
          if (!canStartDrag(p.y, e.pointerType || "mouse")) return;
          if (e.pointerType !== "mouse") e.preventDefault();
          onDragStart(e, p.x, p.y);
        },
        { passive: false },
      );
      canvas.addEventListener(
        "pointermove",
        (e) => {
          if (!player.dragging || player.dragId !== e.pointerId) return;
          const p = pointerToGame(e.clientX, e.clientY);
          onDragMove(e, p.x, p.y);
        },
        { passive: true },
      );
      canvas.addEventListener("pointerup", (e) => onDragEnd(e));
      canvas.addEventListener("pointercancel", (e) => onDragEnd(e));
      canvas.addEventListener("lostpointercapture", (e) => {
        if (player.dragId === e.pointerId) onDragEnd(e);
      });

      btnStart.addEventListener("click", () => {
        overlay.classList.add("hidden");
        resetGame({ bossTest: false });
      });

      btnBossTest.addEventListener("click", () => {
        overlay.classList.add("hidden");
        resetGame({ bossTest: true });
      });

      if (bossTestFromUrl) {
        btnBossTest.textContent = "Boss 試打（網址已啟用）";
      }

      bindHudTap(btnWeapon, () => {
        if (!running) return;
        cycleWeapon();
      });
      bindHudTap(btnBomb, () => useBomb());
      bindHudTap(btnShield, () => useShield());
      bindHudTap(btnUlt, () => useUltimate());

      window.addEventListener("resize", resize);
      resize();
      if (bossTestFromUrl) {
        overlay.classList.add("hidden");
        resetGame({ bossTest: true });
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
