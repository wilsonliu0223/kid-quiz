<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>天空射擊 · 關卡1 試玩（原型）</title>
    <style>
      :root {
        --bg-deep: #0a1628;
        --zone-top: #0f2840;
        --zone-mid: #1a2d4a;
        --zone-bot: #0d1f35;
        --line: #3d6b8a;
        --gold: #ffd54a;
        --p1-body: #a8c8e8;
        --p1-glow: #4da6ff;
        --enemy: #5a6b4a;
        --enemy-bullet: #ff4080;
        --hud-h: 58px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      html,
      body,
      canvas,
      #game-wrap {
        touch-action: none;
      }

      #hud,
      #hud .hud-btn,
      #overlay .big-btn,
      .back-home {
        touch-action: manipulation;
        pointer-events: auto;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg-deep);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #e8f4ff;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 520px;
        margin: 0 auto;
      }

      #topbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 13px;
        background: #081220;
        border-bottom: 1px solid var(--line);
      }

      #topbar strong {
        color: var(--gold);
        font-size: 15px;
      }

      .back-home {
        color: #8ec8ff;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        flex-shrink: 0;
      }

      .back-home:active {
        opacity: 0.75;
      }

      #game-wrap {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: none;
        touch-action: none;
      }

      #game-wrap.dragging canvas {
        cursor: none;
      }

      #hud {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: stretch;
        gap: 4px;
        padding: 6px 6px;
        background: #081220;
        border-top: 1px solid var(--line);
        position: relative;
        z-index: 5;
      }

      .hud-btn {
        border: 2px solid var(--line);
        background: #152a45;
        color: #e8f4ff;
        border-radius: 10px;
        min-height: 42px;
        min-width: 0;
        width: 100%;
        padding: 4px 2px;
        font-size: clamp(9px, 2.6vw, 12px);
        font-weight: 600;
        cursor: pointer;
        line-height: 1.15;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: normal;
        word-break: keep-all;
      }

      .hud-btn:active {
        transform: scale(0.96);
      }

      .hud-btn.active {
        border-color: var(--gold);
        box-shadow: 0 0 12px rgba(255, 213, 74, 0.35);
        color: var(--gold);
      }

      .hud-btn:disabled {
        opacity: 0.45;
        pointer-events: none;
      }

      #btn-missile:disabled:not(.on) {
        opacity: 0.45;
      }

      #btn-missile.on {
        opacity: 1;
        border-color: #d4a8ff;
        color: #fff4ff;
        background: linear-gradient(180deg, #4a3270 0%, #2a1848 100%);
        box-shadow:
          0 0 18px rgba(210, 140, 255, 0.75),
          0 0 6px rgba(255, 255, 255, 0.3);
        animation: missile-glow 0.85s ease-in-out infinite alternate;
      }

      @keyframes missile-glow {
        from {
          box-shadow:
            0 0 12px rgba(190, 120, 255, 0.55),
            0 0 4px rgba(255, 255, 255, 0.2);
        }
        to {
          box-shadow:
            0 0 22px rgba(230, 160, 255, 0.95),
            0 0 10px rgba(255, 255, 255, 0.4);
        }
      }

      #btn-bomb {
        border-color: #ff8c42;
        color: #ffb87a;
      }

      #btn-ult.ready {
        border-color: var(--gold);
        color: var(--gold);
        box-shadow: 0 0 14px rgba(255, 213, 74, 0.45);
      }

      #btn-weapon.laser-mode {
        border-color: #00d4ff;
        color: #a8f0ff;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }

      #btn-shield {
        border-color: #6ec8ff;
        color: #a8e4ff;
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 12, 24, 0.88);
        z-index: 10;
        padding: 20px;
        text-align: center;
      }

      #overlay.hidden {
        display: none;
      }

      #overlay h1 {
        font-size: 22px;
        color: var(--gold);
        margin-bottom: 8px;
      }

      #overlay p {
        font-size: 14px;
        line-height: 1.5;
        color: #a8c8e8;
        margin-bottom: 16px;
      }

      #overlay .big-btn {
        border: none;
        background: linear-gradient(180deg, #ffb830, #e88a10);
        color: #1a1200;
        font-size: 17px;
        font-weight: 700;
        padding: 14px 32px;
        border-radius: 14px;
        cursor: pointer;
      }

      .big-btn.secondary {
        margin-top: 10px;
        background: linear-gradient(180deg, #5a8ab0, #2a5080);
        color: #e8f4ff;
      }

      .hint {
        font-size: 11px;
        color: #6a8aa8;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <a href="../index.html" class="back-home">← 首頁</a>
        <span id="stage-label">關卡1</span>
        <strong id="score">0</strong>
        <span id="stats">♥♥♥ · P○○○ · 逃走 0</span>
      </div>
      <div id="game-wrap">
        <canvas id="game"></canvas>
        <div id="overlay">
          <div>
            <h1>天空射擊</h1>
            <p>
              下格<strong>按住拖曳</strong>（滑鼠／手指）閃彈 · 自動射擊<br />
              中格敵機會<strong>往右逃</strong> · 擊落得分<br />
              擊落敵機掉落 <strong>P火力／⚡必殺／擴散／雷射／盾／導彈</strong><br />
              <strong>P 球</strong>升級子彈排數 · 中彈降一級 · 約 95 秒 Boss 來襲<br />
            </p>
            <button type="button" class="big-btn" id="btn-start">開始</button>
            <button type="button" class="big-btn secondary" id="btn-boss-test">
              Boss 試打
            </button>
            <p class="hint">獨立試玩頁 · 網址加 <code>?boss=1</code> 也可直接試 Boss</p>
          </div>
        </div>
      </div>
      <div id="hud">
        <button type="button" class="hud-btn active" id="btn-weapon">直射彈</button>
        <button type="button" class="hud-btn" id="btn-shield" disabled>無敵盾 ×0</button>
        <button type="button" class="hud-btn" id="btn-missile" disabled>導彈</button>
        <button type="button" class="hud-btn" id="btn-bomb">炸彈 ×1</button>
        <button type="button" class="hud-btn" id="btn-ult" disabled>必殺 0/3</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const statsEl = document.getElementById("stats");
      const overlay = document.getElementById("overlay");
      const btnStart = document.getElementById("btn-start");
      const btnBossTest = document.getElementById("btn-boss-test");
      const btnWeapon = document.getElementById("btn-weapon");
      const btnBomb = document.getElementById("btn-bomb");
      const btnShield = document.getElementById("btn-shield");
      const btnMissile = document.getElementById("btn-missile");
      const btnUlt = document.getElementById("btn-ult");

      const PICKUP = {
        energy: { label: "⚡", color: "#ffe080", glow: "#4da6ff" },
        spread: { label: "S", color: "#ffb830", glow: "#ff8040" },
        laser: { label: "L", color: "#80e8ff", glow: "#00d4ff" },
        shield: { label: "盾", color: "#a8e4ff", glow: "#4da6ff" },
        missile: { label: "M", color: "#e0c8ff", glow: "#a060ff" },
        power: { label: "P", color: "#ffb830", glow: "#ff8040" },
      };

      const POWER_MAX = 3;
      const POWER_OFFSETS = [
        [0],
        [-10, 10],
        [-12, 0, 12],
        [-16, -8, 0, 8, 16],
      ];

      const WEAPON_LABELS = {
        straight: "直射彈",
        spread: "擴散彈",
        laser: "雷射彈",
      };

      const ZONE = { top: 0.22, mid: 0.48, bot: 0.3 };
      const COLORS = {
        p1: "#a8c8e8",
        p1Glow: "#4da6ff",
        bullet: "#fff6a0",
        bulletEdge: "#ffb830",
        enemy: "#5a6b4a",
        enemyDark: "#2d3a24",
        eBullet: "#ff4080",
        boss: "#8b3030",
        gold: "#ffd54a",
      };

      let W = 0;
      let H = 0;
      let zoneY = { top: 0, mid: 0, bot: 0, botEnd: 0 };
      let running = false;
      let gameOver = false;
      let won = false;
      let time = 0;
      let score = 0;
      let escaped = 0;
      let lives = 3;
      let invuln = 0;
      let bombs = 1;
      let energy = 0;
      let shieldStock = 0;
      let powerLevel = 0;
      let hasSpread = false;
      let hasLaser = false;
      let missileAssistT = 0;
      let missileCd = 0;
      let shieldVisualT = 0;
      let ultActiveT = 0;
      let bossOrbCd = 5;
      let weapon = "straight";
      let fireCd = 0;
      let spawnCd = 0;
      let spawnCdSky = 0;
      let spawnCdMid = 0;
      let bossSpawned = false;
      let flash = 0;
      let campTime = 0;
      let bossTestMode = false;
      const bossTestFromUrl = new URLSearchParams(location.search).has("boss");

      const player = {
        x: 0,
        y: 0,
        w: 30,
        h: 27,
        dragging: false,
        dragId: null,
        pointerType: "mouse",
      };
      const PLAYER_SCALE = 0.75;
      const PLAYER_HIT_R = 10;
      const MISSILE_ASSIST_SEC = 5;
      const MISSILE_FIRE_INTERVAL = 1.45;
      const ENEMY_DEATH_LINGER_SEC = 0.4;
      const BOSS_HOMING_SEC = 3;
      const STAGE1_BOSS_AT = 95;
      const STAGE1_BOSS_HP = 240;
      const VICTORY_EXPLODE_END = 3;
      const VICTORY_TOTAL_END = 6.5;
      const bullets = [];
      const enemyBullets = [];
      const enemies = [];
      const particles = [];
      const bombOrbs = [];
      const telegraphs = [];
      const pendingSpawns = [];
      const powerOrbs = [];
      const missileLaserTracks = [];
      let playerLaser = null;
      let victorySeq = null;

      function activateMissileAssist() {
        missileAssistT = Math.max(missileAssistT, MISSILE_ASSIST_SEC);
      }

      function clearMissileAssist() {
        missileAssistT = 0;
        missileLaserTracks.length = 0;
      }

      function zoneBounds() {
        zoneY.top = 0;
        zoneY.mid = H * ZONE.top;
        zoneY.bot = zoneY.mid + H * ZONE.mid;
        zoneY.botEnd = zoneY.bot + H * ZONE.bot;
      }

      function resize() {
        const wrap = document.getElementById("game-wrap");
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const prevW = W;
        const prevH = H;
        W = wrap.clientWidth;
        H = wrap.clientHeight;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (prevW > 0 && prevH > 0 && (prevW !== W || prevH !== H)) {
          const sx = W / prevW;
          const sy = H / prevH;
          const scaleEnt = (o) => {
            o.x *= sx;
            o.y *= sy;
          };
          player.x *= sx;
          player.y *= sy;
          for (const e of enemies) {
            scaleEnt(e);
            if (e.cruiseY != null) e.cruiseY *= sy;
          }
          for (const b of bullets) scaleEnt(b);
          for (const eb of enemyBullets) scaleEnt(eb);
          for (const o of powerOrbs) scaleEnt(o);
          for (const p of pendingSpawns) {
            p.tx *= sx;
            p.ty *= sy;
          }
        }
        zoneBounds();
        if (!running && !gameOver) {
          player.x = W / 2;
          player.y = zoneY.botEnd - 40;
        }
      }

      function clampPlayer() {
        const pad = 14;
        player.x = Math.max(pad, Math.min(W - pad, player.x));
        player.y = Math.max(
          zoneY.bot + pad,
          Math.min(zoneY.botEnd - pad - 6, player.y),
        );
      }

      function spawnBossNow() {
        if (bossSpawned) return;
        bossSpawned = true;
        bossOrbCd = 5;
        pendingSpawns.length = 0;
        for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i].kind !== "boss") enemies.splice(i, 1);
        }
        spawnEnemyAt({
          kind: "boss",
          route: "cruise",
          tx: 0,
          ty: 0,
        });
        const label = document.getElementById("stage-label");
        if (label) {
          label.textContent = bossTestMode ? "Boss 試打" : "Boss 來襲！";
        }
        flash = 0.14;
      }

      function resetGame({ bossTest = false } = {}) {
        bossTestMode = bossTest;
        running = true;
        gameOver = false;
        won = false;
        time = 0;
        score = 0;
        escaped = 0;
        lives = 3;
        invuln = 0;
        bombs = bossTest ? 2 : 1;
        weapon = "straight";
        powerLevel = 0;
        hasSpread = false;
        hasLaser = false;
        playerLaser = null;
        clearMissileAssist();
        missileCd = 0;
        shieldVisualT = 0;
        fireCd = 0;
        spawnCd = 0;
        spawnCdSky = 0;
        spawnCdMid = 0;
        bossSpawned = false;
        flash = 0;
        bullets.length = 0;
        enemyBullets.length = 0;
        enemies.length = 0;
        particles.length = 0;
        bombOrbs.length = 0;
        telegraphs.length = 0;
        pendingSpawns.length = 0;
        powerOrbs.length = 0;
        missileLaserTracks.length = 0;
        victorySeq = null;
        energy = 0;
        shieldStock = 0;
        ultActiveT = 0;
        bossOrbCd = 5;
        campTime = 0;
        player.x = W / 2;
        player.y = zoneY.botEnd - 40;
        syncWeaponButton();
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0;
        document.getElementById("stage-label").textContent = bossTest
          ? "Boss 試打"
          : "關卡1 · 海岸線";
        updateHud();
        if (bossTest) spawnBossNow();
        updateHudButtons();
      }

      function getUnlockedWeapons() {
        const list = ["straight"];
        if (hasSpread) list.push("spread");
        if (hasLaser) list.push("laser");
        return list;
      }

      function cycleWeapon() {
        const list = getUnlockedWeapons();
        if (list.length <= 1) return;
        const i = list.indexOf(weapon);
        weapon = list[(i + 1) % list.length];
        syncWeaponButton();
      }

      function powerHudStr() {
        return `P${"●".repeat(powerLevel)}${"○".repeat(POWER_MAX - powerLevel)}`;
      }

      function getShotOffsets() {
        if (ultActiveT > 0) return [-8, 0, 8];
        return POWER_OFFSETS[powerLevel];
      }

      function syncWeaponButton() {
        btnWeapon.textContent = WEAPON_LABELS[weapon] || "直射彈";
        btnWeapon.classList.toggle("active", weapon !== "straight");
        btnWeapon.classList.toggle("laser-mode", weapon === "laser");
        btnWeapon.disabled = !running || gameOver;
      }

      function updateHudButtons() {
        btnShield.textContent = `無敵盾 ×${shieldStock}`;
        btnShield.disabled = shieldStock <= 0 || !running || gameOver;
        btnMissile.textContent =
          missileAssistT > 0 ? `導彈${Math.ceil(missileAssistT)}s` : "導彈";
        btnMissile.disabled = true;
        btnMissile.classList.toggle("on", missileAssistT > 0);
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0 || !running || gameOver;
        btnUlt.textContent = `必殺 ${energy}/3`;
        btnUlt.disabled = energy < 3 || !running || gameOver || ultActiveT > 0;
        btnUlt.classList.toggle("ready", energy >= 3);
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        const eStr = "⚡".repeat(energy) + "○".repeat(Math.max(0, 3 - energy));
        statsEl.textContent = `${"♥".repeat(lives)}${"♡".repeat(Math.max(0, 3 - lives))} · ${powerHudStr()} · ${eStr} · 逃走 ${escaped}`;
        updateHudButtons();
      }

      function spawnPowerOrb(x, y, type) {
        powerOrbs.push({
          type,
          x,
          y,
          vy: 22 + Math.random() * 16,
          wobble: Math.random() * Math.PI * 2,
          life: 11,
        });
      }

      function rollDropOnKill(kind, x, y) {
        const r = Math.random();
        if (kind === "grunt") {
          if (r < 0.24) spawnPowerOrb(x, y, "energy");
          else if (r < 0.4) spawnPowerOrb(x, y, "power");
          else if (r < 0.52) spawnPowerOrb(x, y, "spread");
          else if (r < 0.64) spawnPowerOrb(x, y, "laser");
          else if (r < 0.74) spawnPowerOrb(x, y, "shield");
          else if (r < 0.84) spawnPowerOrb(x, y, "missile");
        } else if (kind === "fast") {
          if (r < 0.28) spawnPowerOrb(x, y, "energy");
          else if (r < 0.44) spawnPowerOrb(x, y, "power");
          else if (r < 0.56) spawnPowerOrb(x, y, "spread");
          else if (r < 0.68) spawnPowerOrb(x, y, "laser");
          else if (r < 0.78) spawnPowerOrb(x, y, "shield");
          else if (r < 0.88) spawnPowerOrb(x, y, "missile");
        } else if (kind === "striker") {
          if (r < 0.3) spawnPowerOrb(x, y, "energy");
          else if (r < 0.5) spawnPowerOrb(x, y, "power");
          else if (r < 0.68) spawnPowerOrb(x, y, "spread");
        } else if (kind === "heavy" || kind === "tank" || kind === "drone" || kind === "bomber") {
          if (r < 0.35) spawnPowerOrb(x, y, "energy");
          else if (r < 0.55) spawnPowerOrb(x, y, "power");
          else if (r < 0.68) spawnPowerOrb(x, y, "spread");
          else if (r < 0.8) spawnPowerOrb(x, y, "laser");
          else if (r < 0.9) spawnPowerOrb(x, y, "shield");
          else spawnPowerOrb(x, y, "missile");
        }
      }

      function collectPickup(type) {
        if (type === "energy") energy = Math.min(3, energy + 1);
        else if (type === "power") {
          const prev = powerLevel;
          powerLevel = Math.min(POWER_MAX, powerLevel + 1);
          if (powerLevel > prev) {
            explode(player.x, player.y - 8, "#ffb830", 6);
          }
        } else if (type === "spread") {
          hasSpread = true;
          weapon = "spread";
          syncWeaponButton();
        } else if (type === "laser") {
          hasLaser = true;
          weapon = "laser";
          syncWeaponButton();
        } else if (type === "shield") shieldStock += 1;
        else if (type === "missile") {
          activateMissileAssist();
          if (weapon === "laser") {
            const muzzle = laserMuzzle();
            flash = Math.max(flash, 0.12);
            explode(muzzle.x, muzzle.y, "#a8e4ff", 10);
          } else {
            missileCd = 0;
          }
        }
        updateHud();
      }

      function isPlayerCamping() {
        const botH = zoneY.botEnd - zoneY.bot;
        return (
          player.x < W * 0.3 &&
          player.y > zoneY.bot + botH * 0.45
        );
      }

      const ENEMY_KINDS = {
        striker: { hp: 2, w: 20, h: 16, speed: 98, speedVar: 22, score: 2, zone: "sky" },
        grunt: { hp: 2, w: 28, h: 22, speed: 46, speedVar: 16, score: 1, zone: "mid" },
        fast: { hp: 1, w: 22, h: 18, speed: 78, speedVar: 20, score: 2, zone: "mid" },
        heavy: { hp: 4, w: 34, h: 26, speed: 40, speedVar: 10, score: 3, zone: "mid" },
        tank: { hp: 6, w: 40, h: 30, speed: 30, speedVar: 8, score: 5, zone: "mid" },
        drone: { hp: 3, w: 26, h: 20, speed: 52, speedVar: 12, score: 2, zone: "mid" },
        bomber: { hp: 5, w: 36, h: 28, speed: 34, speedVar: 8, score: 4, zone: "mid" },
      };

      function enemyZone(e) {
        return e.zone || (e.kind === "striker" ? "sky" : "mid");
      }

      function countEnemiesInZone(zone) {
        return enemies.filter((e) => e.kind !== "boss" && enemyZone(e) === zone).length;
      }

      function countPendingInZone(zone) {
        return pendingSpawns.filter((p) => p.zone === zone).length;
      }

      function enemyScore(kind) {
        return ENEMY_KINDS[kind]?.score ?? (kind === "boss" ? 10 : 1);
      }

      /** 雲層區（第二區）敵機種類 */
      function pickSpawnKindMid(route) {
        const r = Math.random();
        if (route === "top") {
          if (time > 50 && r < 0.12) return "tank";
          if (r < 0.22) return "bomber";
          if (r < 0.42) return "drone";
          if (r < 0.58) return "heavy";
          if (r < 0.72) return "fast";
          if (r < 0.84) return "tank";
          return "grunt";
        }
        if (time > 55 && r < 0.1) return "tank";
        if (r < 0.18) return "fast";
        if (r < 0.36) return "heavy";
        if (r < 0.48) return "tank";
        if (r < 0.6) return "drone";
        return "grunt";
      }

      function pickSpawnRouteMid() {
        const r = Math.random();
        if (campTime > 2.5) {
          if (r < 0.42) return "top";
          if (r < 0.71) return "left";
          return "right";
        }
        if (r < 0.34) return "top";
        if (r < 0.67) return "left";
        return "right";
      }

      /** 天空上區：快速連射敵機 */
      function pickSpawnRouteSky() {
        const r = Math.random();
        if (r < 0.38) return "skyTop";
        if (r < 0.69) return "left";
        return "right";
      }

      function queueSpawnSky(warn = 0.42) {
        const route = pickSpawnRouteSky();
        const skyBot = zoneY.mid - 28;
        let tx;
        let ty;
        if (route === "skyTop") {
          tx = 36 + Math.random() * (W - 72);
          ty = 14;
        } else {
          tx = route === "left" ? 22 : W - 22;
          ty = 24 + Math.random() * Math.max(40, skyBot - 48);
        }
        pendingSpawns.push({ kind: "striker", route, tx, ty, warn, zone: "sky" });
      }

      function queueSpawnMid(kind, warn = 0.55) {
        const midH = zoneY.bot - zoneY.mid;
        const route = pickSpawnRouteMid();
        const enemyKind = kind && kind !== "striker" ? kind : pickSpawnKindMid(route);
        let tx;
        let ty;
        if (route === "top") {
          tx = 36 + Math.random() * (W - 72);
          ty = zoneY.mid + 14;
        } else {
          tx = route === "left" ? 22 : W - 22;
          ty = zoneY.mid + 24 + Math.random() * (midH - 48);
        }
        pendingSpawns.push({ kind: enemyKind, route, tx, ty, warn, zone: "mid" });
      }

      function queueSpawn(kind, warn = 0.55) {
        queueSpawnMid(kind, warn);
      }

      function spawnEnemyAt(spec) {
        const midH = zoneY.bot - zoneY.mid;
        const { kind, route, tx, ty } = spec;
        const zone = spec.zone || (kind === "striker" ? "sky" : "mid");
        if (kind === "boss") {
          enemies.push({
            kind: "boss",
            route: "cruise",
            spawnShield: 0,
            movePhase: "cruise",
            x: W * 0.38,
            y: zoneY.mid + midH * 0.32,
            w: 88,
            h: 56,
            hp: STAGE1_BOSS_HP,
            speed: 22,
            fireCd: 0.5,
            phase: 0,
            spin: 0,
          });
          return;
        }
        if (kind === "striker") {
          const spd = 98 + Math.random() * 22;
          const cruiseY = Math.min(zoneY.mid - 32, ty + zoneY.mid * 0.22);
          if (route === "skyTop") {
            enemies.push({
              kind: "striker",
              zone: "sky",
              route,
              spawnShield: 0.35,
              movePhase: "drop",
              x: tx,
              y: ty,
              w: 20,
              h: 16,
              hp: 2,
              maxHp: 2,
              speed: spd,
              vx: spd * 0.42 * (Math.random() < 0.5 ? 1 : -1),
              dropVy: 88,
              cruiseY,
              fireCd: 0.15 + Math.random() * 0.2,
              wobble: Math.random() * Math.PI * 2,
            });
          } else {
            enemies.push({
              kind: "striker",
              zone: "sky",
              route,
              spawnShield: 0.7,
              movePhase: "cruise",
              x: route === "left" ? -36 : W + 36,
              y: ty,
              w: 20,
              h: 16,
              hp: 2,
              maxHp: 2,
              speed: spd,
              vx: route === "left" ? spd : -spd,
              fireCd: 0.18 + Math.random() * 0.22,
              wobble: Math.random() * Math.PI * 2,
            });
          }
          return;
        }
        const stat = ENEMY_KINDS[kind] || ENEMY_KINDS.grunt;
        const spd = stat.speed + Math.random() * stat.speedVar;
        const base = {
          zone: "mid",
          route,
          kind,
          spawnShield: route === "top" ? 0.5 : 1.0,
          movePhase: route === "top" ? "drop" : "cruise",
          w: stat.w,
          h: stat.h,
          hp: stat.hp,
          maxHp: stat.hp,
          speed: spd,
          fireCd:
            kind === "fast"
              ? 1.6 + Math.random() * 1.4
              : kind === "tank"
                ? 1.8 + Math.random() * 1.0
                : kind === "bomber"
                  ? 1.5 + Math.random() * 1.0
                  : kind === "drone"
                    ? 1.2 + Math.random() * 0.8
                    : kind === "heavy"
                      ? 1.3 + Math.random() * 1.0
                      : 1.4 + Math.random() * 1.2,
          dropVy:
            route === "top"
              ? kind === "fast"
                ? 72
                : kind === "bomber"
                  ? 42
                  : kind === "tank"
                    ? 48
                    : kind === "drone"
                      ? 64
                      : 58
              : 0,
          wobble: kind === "drone" ? Math.random() * Math.PI * 2 : 0,
        };
        if (route === "top") {
          const cruiseFrac =
            kind === "fast"
              ? 0.32
              : kind === "tank"
                ? 0.45
                : kind === "bomber"
                  ? 0.52
                  : kind === "drone"
                    ? 0.35
                    : kind === "heavy"
                      ? 0.4
                      : 0.38;
          enemies.push({
            ...base,
            x: tx,
            y: ty,
            vx: spd * 0.35 * (Math.random() < 0.5 ? 1 : -1),
            cruiseY: ty + (zoneY.bot - zoneY.mid) * cruiseFrac,
            cruiseVy: kind === "bomber" ? 18 : kind === "drone" ? 12 : 0,
          });
        } else if (route === "left") {
          enemies.push({ ...base, x: -44, y: ty, vx: spd });
        } else {
          enemies.push({ ...base, x: W + 44, y: ty, vx: -spd });
        }
      }

      function spawnEnemy(kind = "grunt") {
        queueSpawn(kind);
      }

      function skySpawnRate() {
        if (bossSpawned) return 999;
        if (time < 40) return 1.1;
        if (time < 90) return 0.85;
        return 0.65;
      }

      function maxSkyEnemies() {
        if (time < 40) return 4;
        if (time < 90) return 5;
        return 6;
      }

      function spawnRate() {
        if (bossSpawned) return 999;
        if (time < 40) return 1.5;
        if (time < 90) return 1.0;
        return 0.75;
      }

      function maxEnemies() {
        if (time < 40) return 7;
        if (time < 90) return 9;
        return 11;
      }

      function maxMidEnemies() {
        return maxEnemies();
      }

      function laserMuzzle() {
        return { x: player.x, y: player.y - player.h * 0.35 };
      }

      function isMissileLaserTarget(e) {
        return e.kind === "boss" || e.spawnShield <= 0;
      }

      function missileTrackDps(e) {
        if (e.kind === "boss") return 0.35;
        if (e.kind === "striker") return 0.016;
        if (e.kind === "tank") return 0.009;
        if (e.kind === "bomber") return 0.01;
        if (e.kind === "heavy") return 0.011;
        if (e.kind === "drone") return 0.013;
        if (e.kind === "fast") return 0.014;
        return 0.028;
      }

      function beginEnemyDeath(e) {
        if (e.dying) return;
        e.dying = true;
        e.dyingT = ENEMY_DEATH_LINGER_SEC;
        e.hp = 0;
      }

      function updateMissileLaserTracks(dt) {
        if (missileAssistT <= 0 || weapon !== "laser") {
          missileLaserTracks.length = 0;
          return;
        }

        const list = enemies.filter(isMissileLaserTarget);

        for (let i = missileLaserTracks.length - 1; i >= 0; i--) {
          if (!enemies.includes(missileLaserTracks[i].target)) {
            missileLaserTracks.splice(i, 1);
          }
        }

        for (const e of list) {
          if (!missileLaserTracks.some((t) => t.target === e)) {
            missileLaserTracks.push({ target: e, pulse: Math.random() * 6 });
          }
        }

        for (let i = missileLaserTracks.length - 1; i >= 0; i--) {
          const t = missileLaserTracks[i];
          const e = t.target;
          if (!e || !enemies.includes(e)) {
            missileLaserTracks.splice(i, 1);
            continue;
          }
          t.pulse += dt * 16;
          if (e.dying) continue;
          if (e.spawnShield <= 0 || e.kind === "boss") {
            e.hp -= missileTrackDps(e) * dt * 60;
            if (e.hp <= 0) beginEnemyDeath(e);
          }
        }
      }

      function drawMissileLaserTracks() {
        if (!missileLaserTracks.length || weapon !== "laser") return;
        const muzzle = laserMuzzle();

        for (const t of missileLaserTracks) {
          const e = t.target;
          if (!e || !enemies.includes(e)) continue;
          const flicker =
            0.82 + Math.sin(t.pulse) * 0.12 + Math.sin(time * 38 + t.pulse) * 0.06;
          const tx = e.x;
          const ty = e.y;

          ctx.save();
          ctx.shadowColor = "#c060ff";
          ctx.shadowBlur = 14;
          ctx.strokeStyle = `rgba(168, 120, 255, ${0.7 * flicker})`;
          ctx.lineWidth = 7 * flicker;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(muzzle.x, muzzle.y);
          ctx.lineTo(tx, ty);
          ctx.stroke();
          ctx.strokeStyle = `rgba(200, 240, 255, ${0.88 * flicker})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(muzzle.x, muzzle.y);
          ctx.lineTo(tx, ty);
          ctx.stroke();
          ctx.fillStyle = `rgba(255,255,255,${0.9 * flicker})`;
          ctx.beginPath();
          ctx.arc(tx, ty, 3.5 * flicker, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.save();
        ctx.shadowColor = "#a060ff";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "rgba(220, 180, 255, 0.9)";
        ctx.beginPath();
        ctx.arc(muzzle.x, muzzle.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function firePlayer() {
        if (weapon === "laser" && ultActiveT <= 0) return;
        const speed = 420;
        const offsets = getShotOffsets();
        const powered = ultActiveT > 0;
        for (const off of offsets) {
          if (weapon === "straight" && !powered) {
            bullets.push({
              x: player.x + off,
              y: player.y - player.h * 0.4,
              vx: 0,
              vy: -speed,
              r: 4,
              dmg: 1,
              trail: [],
            });
          } else {
            const spreads = powered ? [-0.18, 0, 0.18] : [-0.22, 0, 0.22];
            for (const a of spreads) {
              bullets.push({
                x: player.x + off,
                y: player.y - player.h * 0.35,
                vx: Math.sin(a) * speed * 0.35,
                vy: -Math.cos(a) * speed * (powered ? 1.1 : 1),
                r: powered ? 4 : 3.5,
                dmg: powered ? 2 : 1,
                trail: [],
              });
            }
          }
        }
      }

      function updatePlayerLaser(dt) {
        const x = player.x;
        const y0 = player.y - player.h * 0.35;
        const top = 0;
        const beamW = 10 + powerLevel * 3.5;
        const half = beamW * 0.55;
        const dps = 4.8 + powerLevel * 0.9;
        playerLaser = { x, y0, top, pulse: (playerLaser?.pulse || 0) + dt * 14, beamW };

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (e.spawnShield > 0 || e.dying) continue;
          if (Math.abs(e.x - x) < half + e.w * 0.4 && e.y <= y0 && e.y >= top) {
            e.hp -= dps * dt * 60;
            if (e.hp <= 0) killEnemy(e, j);
            else if (e.kind === "boss" && Math.random() < 0.06)
              spawnPowerOrb(e.x, e.y + 10, "energy");
          }
        }
      }

      function drawPlayerLaser() {
        if (!playerLaser || weapon !== "laser" || ultActiveT > 0) return;
        const { x, y0, top, pulse, beamW } = playerLaser;
        const h = y0 - top;
        const flicker = 0.82 + Math.sin(pulse) * 0.12 + Math.sin(time * 42) * 0.06;
        const coreW = (3.5 + powerLevel * 0.4) * flicker;
        const midW = (beamW * 0.75) * flicker;

        ctx.save();
        ctx.shadowColor = "#00e5ff";
        ctx.shadowBlur = 18;

        const outer = ctx.createLinearGradient(x, y0, x, top);
        outer.addColorStop(0, "rgba(0, 220, 255, 0.55)");
        outer.addColorStop(0.35, "rgba(80, 200, 255, 0.28)");
        outer.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = outer;
        ctx.fillRect(x - midW * 1.4, top, midW * 2.8, h);

        const mid = ctx.createLinearGradient(x, y0, x, top);
        mid.addColorStop(0, "rgba(120, 240, 255, 0.9)");
        mid.addColorStop(0.5, "rgba(60, 180, 255, 0.65)");
        mid.addColorStop(1, "rgba(200,240,255,0)");
        ctx.fillStyle = mid;
        ctx.fillRect(x - midW, top, midW * 2, h);

        ctx.fillStyle = `rgba(255,255,255,${0.92 * flicker})`;
        ctx.fillRect(x - coreW * 0.5, top, coreW, h);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(x, y0 - 2, 5 * flicker, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function fireMissileAssist() {
        const side = Math.random() < 0.5 ? -14 : 14;
        bullets.push({
          x: player.x + side,
          y: player.y - 10,
          vx: side * 1.2,
          vy: -185,
          r: 4.5,
          dmg: 3,
          trail: [],
          homing: 0.3,
          missile: true,
        });
      }

      function useShield() {
        if (shieldStock <= 0 || gameOver) return;
        shieldStock -= 1;
        invuln = Math.max(invuln, 3.8);
        shieldVisualT = 3.8;
        flash = 0.08;
        updateHud();
      }

      function useUltimate() {
        if (energy < 3 || gameOver || ultActiveT > 0) return;
        energy -= 3;
        ultActiveT = 2.8;
        invuln = 0.6;
        flash = 0.1;
        updateHud();
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function bossMegaExplode(x, y, big = false) {
        const n = big ? 40 : 22;
        explode(x, y, "#ff5030", n);
        explode(x, y, "#ffb830", Math.floor(n * 0.65));
        explode(x, y, "#fff6a0", Math.floor(n * 0.45));
        explode(x, y, COLORS.boss, Math.floor(n * 0.35));
        flash = Math.max(flash, big ? 0.38 : 0.22);
        if (victorySeq) {
          victorySeq.rings.push({
            x,
            y,
            r: 10,
            life: 0.95,
            maxR: big ? 150 : 95,
          });
        }
      }

      function startBossVictory(x, y) {
        victorySeq = {
          phase: "explode",
          t: 0,
          x,
          y,
          burstCd: 0,
          bursts: 0,
          rings: [],
          bossTest: bossTestMode,
        };
        invuln = 99;
        bullets.length = 0;
        enemyBullets.length = 0;
        pendingSpawns.length = 0;
        bombOrbs.length = 0;
        powerOrbs.length = 0;
        missileLaserTracks.length = 0;
        playerLaser = null;
        clearMissileAssist();
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          explode(e.x, e.y, COLORS.enemy, 10);
          enemies.splice(i, 1);
        }
        bossMegaExplode(x, y, true);
      }

      function updateVictory(dt) {
        if (!victorySeq) return;
        victorySeq.t += dt;
        flash = Math.max(0, flash - dt * 0.4);

        if (victorySeq.phase === "explode") {
          victorySeq.burstCd -= dt;
          if (victorySeq.burstCd <= 0 && victorySeq.bursts < 14) {
            victorySeq.burstCd = 0.09 + victorySeq.bursts * 0.016;
            victorySeq.bursts++;
            const spread = victorySeq.bursts * 18;
            bossMegaExplode(
              victorySeq.x + (Math.random() - 0.5) * spread * 1.6,
              victorySeq.y + (Math.random() - 0.5) * spread * 0.8,
            );
          }
          if (victorySeq.t >= VICTORY_EXPLODE_END) victorySeq.phase = "banner";
        } else if (victorySeq.phase === "banner" && victorySeq.t >= VICTORY_TOTAL_END) {
          const wasBossTest = victorySeq.bossTest;
          victorySeq = null;
          endGame(true, wasBossTest);
          return;
        }

        for (const ring of victorySeq.rings) {
          ring.life -= dt;
          ring.r += (ring.maxR - ring.r) * dt * 5;
        }
        victorySeq.rings = victorySeq.rings.filter((r) => r.life > 0);
        updateParticles(dt);
      }

      function drawVictory() {
        if (!victorySeq) return;
        const { phase, t, x, y, bossTest } = victorySeq;

        for (const ring of victorySeq.rings) {
          ctx.strokeStyle = `rgba(255, 190, 70, ${ring.life * 0.8})`;
          ctx.lineWidth = 3 + (1 - ring.life) * 5;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (phase === "explode") {
          const core = Math.max(0, 1 - t / (VICTORY_EXPLODE_END - 0.2));
          const grd = ctx.createRadialGradient(x, y, 0, x, y, 60 + t * 55);
          grd.addColorStop(0, `rgba(255,255,220,${0.65 * core})`);
          grd.addColorStop(0.35, `rgba(255,120,30,${0.45 * core})`);
          grd.addColorStop(1, "rgba(255,40,10,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(x, y, 60 + t * 55, 0, Math.PI * 2);
          ctx.fill();
        }

        const showBanner = phase === "banner" || t > VICTORY_EXPLODE_END * 0.55;
        if (!showBanner) return;

        const bannerStart = VICTORY_EXPLODE_END * 0.55;
        const bannerT = t - bannerStart;
        const alpha = Math.min(1, bannerT / 0.5);
        const pulse = 0.92 + Math.sin(t * 9) * 0.06;
        const stageLine = bossTest ? "Boss 試打 · 通過" : "關卡1 · 通過";

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        ctx.shadowColor = COLORS.gold;
        ctx.shadowBlur = 24;
        ctx.fillStyle = COLORS.gold;
        ctx.font = `bold ${32 * pulse}px sans-serif`;
        ctx.fillText("STAGE CLEAR!", W / 2, zoneY.mid + 22);
        ctx.font = `bold ${20 * pulse}px sans-serif`;
        ctx.fillStyle = "#e8f4ff";
        ctx.shadowBlur = 12;
        ctx.fillText(stageLine, W / 2, zoneY.mid + 56);
        if (phase === "banner" && bannerT > 0.6) {
          ctx.font = "13px sans-serif";
          ctx.fillStyle = "#8ec8ff";
          ctx.shadowBlur = 0;
          const dots = ".".repeat(1 + (Math.floor(t * 3) % 3));
          ctx.fillText(`準備成績${dots}`, W / 2, zoneY.mid + 86);
        }
        ctx.restore();
      }

      function explode(x, y, color, n = 8, lifeScale = 1) {
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 * i) / n + Math.random() * 0.3;
          const sp = 40 + Math.random() * 80;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: (0.35 + Math.random() * 0.25) * lifeScale,
            color,
          });
        }
      }

      function hitPlayer() {
        if (invuln > 0 || gameOver) return;
        lives -= 1;
        invuln = 1.2;
        if (powerLevel > 0) powerLevel -= 1;
        clearMissileAssist();
        explode(player.x, player.y, COLORS.p1Glow, 12);
        updateHud();
        if (lives <= 0) endGame(false);
      }

      function killEnemy(e, idx) {
        score += enemyScore(e.kind);
        if (e.kind === "boss") {
          const { x, y } = e;
          enemies.splice(idx, 1);
          updateHud();
          startBossVictory(x, y);
          return;
        }
        explode(e.x, e.y, COLORS.enemy, 10, 1.35);
        explode(e.x, e.y, "#80e8ff", 6, 1.2);
        rollDropOnKill(e.kind, e.x, e.y);
        enemies.splice(idx, 1);
        updateHud();
      }

      function endGame(win, bossTestWin = false) {
        gameOver = true;
        won = win;
        running = false;
        victorySeq = null;
        overlay.classList.remove("hidden");
        overlay.querySelector("h1").textContent = win
          ? bossTestWin
            ? "Boss 試打完成！"
            : "恭喜過關！"
          : "GAME OVER";
        overlay.querySelector("p").innerHTML = win
          ? `最終得分 <strong style="font-size:1.4em;color:#ffd54a">${score}</strong><br/>逃走 ${escaped} 隻 · 剩餘 ${"♥".repeat(lives)}<br/>太棒了，再挑戰一次？`
          : `得分 ${score} · 再試一次？<br/>拖曳下格閃開粉色敵彈`;
        btnStart.textContent = "再玩一次";
      }

      function useBomb() {
        if (bombs <= 0 || gameOver || bombOrbs.some((b) => b.active)) return;
        bombs -= 1;
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0;
        bombOrbs.push({
          active: true,
          phase: "launch",
          x: player.x,
          y: player.y - 8,
          vx: 0,
          vy: -280,
          targetY: zoneY.mid + (zoneY.bot - zoneY.mid) * 0.55,
          wobble: 0,
        });
      }

      function burstBomb(orb) {
        orb.active = false;
        flash = 0.18;
        const cx = orb.x;
        const cy = orb.y;
        explode(cx, cy, "#ffb830", 24);
        explode(cx, cy, "#fff6a0", 16);
        const rings = 3;
        const perRing = 18;
        for (let ring = 0; ring < rings; ring++) {
          const baseSp = 140 + ring * 55;
          for (let i = 0; i < perRing; i++) {
            const a = (Math.PI * 2 * i) / perRing + ring * 0.11;
            bullets.push({
              x: cx,
              y: cy,
              vx: Math.cos(a) * baseSp,
              vy: Math.sin(a) * baseSp,
              r: ring === 0 ? 5 : 4,
              dmg: ring === 0 ? 3 : 2,
              trail: [],
              bombShard: true,
              life: 1.2,
            });
          }
        }
        for (let i = 0; i < 36; i++) {
          const a = -Math.PI / 2 + (i / 35) * Math.PI * 0.95;
          bullets.push({
            x: cx,
            y: cy,
            vx: Math.cos(a) * (200 + Math.random() * 80),
            vy: Math.sin(a) * (200 + Math.random() * 80),
            r: 3.5,
            dmg: 2,
            trail: [],
            bombShard: true,
            life: 0.9,
          });
        }
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const eb = enemyBullets[i];
          if (Math.hypot(eb.x - cx, eb.y - cy) < 90) enemyBullets.splice(i, 1);
        }
      }

      function bossAttack(e) {
        e.spin += 0.4;
        const px = player.x;
        const py = player.y;
        const roll = Math.random();
        if (roll < 0.35) {
          telegraphs.push({ x: e.x, y: e.y, r: 8, maxR: 72, life: 0.45, color: "#ff6eb4" });
          const n = 16;
          for (let i = 0; i < n; i++) {
            const a = (Math.PI * 2 * i) / n + e.spin;
            enemyBullets.push({
              x: e.x,
              y: e.y,
              vx: Math.cos(a) * 130,
              vy: Math.sin(a) * 130,
              r: 5,
              glow: true,
            });
          }
        } else if (roll < 0.65) {
          for (let i = 0; i < 8; i++) {
            const a = -Math.PI / 2 + (i - 3.5) * 0.14;
            enemyBullets.push({
              x: e.x - 20 + i * 5,
              y: e.y + 10,
              vx: Math.cos(a) * 150,
              vy: Math.sin(a) * 150,
              r: 4.5,
              glow: true,
            });
          }
        } else {
          const ang = Math.atan2(py - e.y, px - e.x);
          for (let k = -1; k <= 1; k++) {
            const a = ang + k * 0.12;
            enemyBullets.push({
              x: e.x,
              y: e.y + 8,
              vx: Math.cos(a) * 200,
              vy: Math.sin(a) * 200,
              r: 5,
              glow: true,
              homing: k === 0 ? 0.15 : 0,
              homingT: k === 0 ? BOSS_HOMING_SEC : 0,
            });
          }
        }
      }

      function enemyAttack(e) {
        if (e.kind === "grunt") {
          for (let k = -1; k <= 1; k++) {
            enemyBullets.push({
              x: e.x,
              y: e.y + e.h * 0.2,
              vx: k * 35,
              vy: 145,
              r: 4,
            });
          }
        } else if (e.kind === "fast") {
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          for (let k = -1; k <= 1; k++) {
            const a = ang + k * 0.2;
            enemyBullets.push({
              x: e.x,
              y: e.y,
              vx: Math.cos(a) * 175,
              vy: Math.sin(a) * 175,
              r: 3.5,
            });
          }
        } else if (e.kind === "striker") {
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          enemyBullets.push({
            x: e.x,
            y: e.y + 5,
            vx: Math.cos(ang) * 235,
            vy: Math.sin(ang) * 235,
            r: 3,
            glow: true,
          });
          if (Math.random() < 0.35) {
            const a2 = ang + (Math.random() - 0.5) * 0.18;
            enemyBullets.push({
              x: e.x,
              y: e.y + 5,
              vx: Math.cos(a2) * 220,
              vy: Math.sin(a2) * 220,
              r: 2.5,
              glow: true,
            });
          }
        } else if (e.kind === "heavy") {
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          for (let k = -2; k <= 2; k++) {
            const a = ang + k * 0.1;
            enemyBullets.push({
              x: e.x,
              y: e.y,
              vx: Math.cos(a) * 140,
              vy: Math.sin(a) * 140,
              r: 4.5,
            });
          }
        } else if (e.kind === "tank") {
          for (let k = -2; k <= 2; k++) {
            enemyBullets.push({
              x: e.x + k * 8,
              y: e.y + e.h * 0.2,
              vx: k * 28,
              vy: 130,
              r: 5,
            });
          }
        } else if (e.kind === "drone") {
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          enemyBullets.push({
            x: e.x,
            y: e.y,
            vx: Math.cos(ang) * 155,
            vy: Math.sin(ang) * 155,
            r: 3.5,
          });
        } else if (e.kind === "bomber") {
          for (let k = -1; k <= 1; k++) {
            enemyBullets.push({
              x: e.x + k * 10,
              y: e.y + e.h * 0.15,
              vx: k * 40,
              vy: 155,
              r: 4.5,
            });
          }
        }
      }

      function circleHit(ax, ay, ar, bx, by, br) {
        const dx = ax - bx;
        const dy = ay - by;
        const r = ar + br;
        return dx * dx + dy * dy < r * r;
      }

      function rectCircleHit(rx, ry, rw, rh, cx, cy, cr) {
        const nx = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
        const ny = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
        const dx = cx - nx;
        const dy = cy - ny;
        return dx * dx + dy * dy < cr * cr;
      }

      function update(dt) {
        if (!running || gameOver) return;

        if (victorySeq) {
          updateVictory(dt);
          return;
        }

        time += dt;
        invuln = Math.max(0, invuln - dt);
        flash = Math.max(0, flash - dt);
        shieldVisualT = Math.max(0, shieldVisualT - dt);
        ultActiveT = Math.max(0, ultActiveT - dt);
        if (ultActiveT <= 0) updateHudButtons();

        if (bossSpawned && enemies.some((e) => e.kind === "boss")) {
          bossOrbCd -= dt;
          if (bossOrbCd <= 0 && powerOrbs.length < 2) {
            bossOrbCd = 7;
            const boss = enemies.find((e) => e.kind === "boss");
            if (boss) {
              const drops = ["energy", "power", "spread", "laser", "shield", "missile"];
              spawnPowerOrb(
                boss.x + (Math.random() - 0.5) * 60,
                boss.y + 20,
                drops[Math.floor(Math.random() * drops.length)],
              );
            }
          }
        }

        if (!bossSpawned && !bossTestMode && time >= STAGE1_BOSS_AT) {
          spawnBossNow();
        }

        if (isPlayerCamping()) campTime += dt;
        else campTime = Math.max(0, campTime - dt * 1.5);

        for (let i = pendingSpawns.length - 1; i >= 0; i--) {
          pendingSpawns[i].warn -= dt;
          if (pendingSpawns[i].warn <= 0) {
            spawnEnemyAt(pendingSpawns[i]);
            pendingSpawns.splice(i, 1);
          }
        }

        spawnCdSky -= dt;
        spawnCdMid -= dt;

        if (
          spawnCdSky <= 0 &&
          countPendingInZone("sky") < 2 &&
          !bossSpawned &&
          countEnemiesInZone("sky") < maxSkyEnemies()
        ) {
          spawnCdSky = skySpawnRate();
          queueSpawnSky();
          if (
            countEnemiesInZone("sky") + countPendingInZone("sky") < maxSkyEnemies() &&
            Math.random() < 0.22
          ) {
            queueSpawnSky();
          }
        }

        if (
          spawnCdMid <= 0 &&
          countPendingInZone("mid") < 4 &&
          !bossSpawned &&
          countEnemiesInZone("mid") < maxMidEnemies()
        ) {
          spawnCdMid = spawnRate();
          if (campTime > 2.5 && Math.random() < 0.4) {
            queueSpawnMid("fast");
          } else {
            queueSpawnMid();
          }
          const midTotal = countEnemiesInZone("mid") + countPendingInZone("mid");
          if (midTotal < maxMidEnemies() && Math.random() < 0.28) {
            queueSpawnMid();
          }
        }

        fireCd -= dt;
        const bombing = bombOrbs.some((b) => b.active);
        if (fireCd <= 0 && !bombing) {
          if (weapon !== "laser" || ultActiveT > 0) {
            fireCd = ultActiveT > 0 ? 0.06 : weapon === "spread" ? 0.14 : 0.09;
            firePlayer();
          }
        }

        if (weapon === "laser" && ultActiveT <= 0 && !bombing) {
          updatePlayerLaser(dt);
        } else {
          playerLaser = null;
        }

        updateMissileLaserTracks(dt);

        if (missileAssistT > 0) {
          missileAssistT -= dt;
          if (weapon !== "laser") {
            missileCd -= dt;
            if (missileCd <= 0 && !bombing) {
              missileCd = MISSILE_FIRE_INTERVAL;
              fireMissileAssist();
            }
          }
          if (missileAssistT <= 0) {
            clearMissileAssist();
            updateHud();
          } else updateHudButtons();
        }

        for (const orb of powerOrbs) {
          orb.life -= dt;
          orb.wobble += dt * 5;
          orb.y += orb.vy * dt;
          orb.x += Math.sin(orb.wobble) * 12 * dt;
          const dx = player.x - orb.x;
          const dy = player.y - orb.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 70) {
            orb.x += dx * 2.8 * dt;
            orb.y += dy * 2.8 * dt;
          }
          if (dist < 24) {
            collectPickup(orb.type);
            orb._gone = true;
          }
        }
        for (let i = powerOrbs.length - 1; i >= 0; i--) {
          if (powerOrbs[i]._gone || powerOrbs[i].life <= 0 || powerOrbs[i].y > zoneY.botEnd) {
            powerOrbs.splice(i, 1);
          }
        }

        for (const orb of bombOrbs) {
          if (!orb.active) continue;
          if (orb.phase === "launch") {
            orb.x += orb.vx * dt;
            orb.y += orb.vy * dt;
            orb.vy += 520 * dt;
            if (orb.vy >= 30) {
              orb.phase = "fall";
              orb.vy = 90;
            }
          } else if (orb.phase === "fall") {
            orb.wobble += dt * 8;
            orb.x += Math.sin(orb.wobble) * 18 * dt;
            orb.y += orb.vy * dt;
            orb.vy = Math.min(orb.vy + 180 * dt, 220);
            if (orb.y >= orb.targetY) burstBomb(orb);
          }
        }
        for (let i = bombOrbs.length - 1; i >= 0; i--) {
          if (!bombOrbs[i].active) bombOrbs.splice(i, 1);
        }

        for (const t of telegraphs) {
          t.life -= dt;
          t.r += (t.maxR - t.r) * dt * 6;
        }
        for (let i = telegraphs.length - 1; i >= 0; i--) {
          if (telegraphs[i].life <= 0) telegraphs.splice(i, 1);
        }

        for (const b of bullets) {
          if (b.homing) {
            let nearest = null;
            let best = Infinity;
            for (const e of enemies) {
              const d = (e.x - b.x) ** 2 + (e.y - b.y) ** 2;
              if (d < best) {
                best = d;
                nearest = e;
              }
            }
            if (nearest) {
              const ang = Math.atan2(nearest.y - b.y, nearest.x - b.x);
              const cur = Math.atan2(b.vy, b.vx);
              let diff = ang - cur;
              while (diff > Math.PI) diff -= Math.PI * 2;
              while (diff < -Math.PI) diff += Math.PI * 2;
              const sp = Math.hypot(b.vx, b.vy);
              const na = cur + diff * b.homing;
              b.vx = Math.cos(na) * sp;
              b.vy = Math.sin(na) * sp;
            }
          }
          if (b.life != null) b.life -= dt;
          b.trail.push({ x: b.x, y: b.y });
          if (b.trail.length > (b.bombShard ? 6 : 4)) b.trail.shift();
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.bombShard) {
            b.vx *= 0.985;
            b.vy *= 0.985;
          }
        }
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.y < -40 || b.y > zoneY.botEnd + 30) bullets.splice(i, 1);
          else if (b.life != null && b.life <= 0) bullets.splice(i, 1);
        }

        for (const e of enemies) {
          if (e.dying) {
            e.dyingT -= dt;
            if (e.dyingT <= 0) e._dyingDone = true;
            continue;
          }
          if (e.spawnShield > 0) e.spawnShield -= dt;

          if (e.kind !== "boss") {
            if (e.movePhase === "drop") {
              e.y += e.dropVy * dt;
              e.x += (e.vx ?? e.speed * 0.35) * dt;
              if (e.y >= e.cruiseY) {
                e.y = e.cruiseY;
                e.movePhase = "cruise";
              }
            } else {
              e.x += (e.vx ?? e.speed) * dt;
              if (e.cruiseVy) e.y += e.cruiseVy * dt;
              if (e.kind === "striker") {
                e.wobble = (e.wobble || 0) + dt * 6;
                e.y += Math.sin(e.wobble) * 22 * dt;
                e.y = Math.max(20, Math.min(zoneY.mid - 24, e.y));
              } else if (e.kind === "drone") {
                e.wobble = (e.wobble || 0) + dt * 4.5;
                e.x += Math.sin(e.wobble) * 28 * dt;
              }
            }
          } else {
            e.x += e.speed * dt * (e.x > W * 0.55 ? -1 : 1);
          }

          const offField =
            e.x < -40 ||
            e.x > W + 40 ||
            e.y > zoneY.botEnd + 30 ||
            (enemyZone(e) === "sky" && e.y > zoneY.mid + 8);
          if (offField) {
            if (e.kind !== "boss") {
              escaped += 1;
              score = Math.max(0, score - 1);
              updateHud();
            }
            e._dead = true;
          }

          e.fireCd -= dt;
          if (
            e.fireCd <= 0 &&
            e.spawnShield <= 0 &&
            e.x > 24 &&
            e.x < W - 24 &&
            (e.kind === "striker"
              ? e.y < zoneY.mid - 10
              : e.y > zoneY.mid + 12 && e.y < zoneY.bot + 8)
          ) {
            if (e.kind === "boss") {
              e.fireCd = e.hp < STAGE1_BOSS_HP * 0.5 ? 0.38 : 0.52;
              bossAttack(e);
            } else {
              e.fireCd =
                e.kind === "striker"
                  ? 0.28 + Math.random() * 0.22
                  : e.kind === "fast"
                  ? 1.1 + Math.random() * 0.6
                  : e.kind === "tank"
                    ? 1.4 + Math.random() * 0.9
                    : e.kind === "bomber"
                      ? 1.2 + Math.random() * 0.8
                      : e.kind === "drone"
                        ? 0.95 + Math.random() * 0.55
                        : e.kind === "heavy"
                          ? 1.0 + Math.random() * 0.7
                          : 0.9 + Math.random() * 0.8;
              enemyAttack(e);
            }
          }
        }
        for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i]._dyingDone) killEnemy(enemies[i], i);
          else if (enemies[i]._dead) enemies.splice(i, 1);
        }

        for (const eb of enemyBullets) {
          if (eb.homing > 0 && eb.homingT > 0) {
            eb.homingT -= dt;
            const ang = Math.atan2(player.y - eb.y, player.x - eb.x);
            const cur = Math.atan2(eb.vy, eb.vx);
            let diff = ang - cur;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const sp = Math.hypot(eb.vx, eb.vy);
            const na = cur + diff * eb.homing;
            eb.vx = Math.cos(na) * sp;
            eb.vy = Math.sin(na) * sp;
            if (eb.homingT <= 0) eb.homing = 0;
          }
          eb.x += eb.vx * dt;
          eb.y += eb.vy * dt;
        }
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const eb = enemyBullets[i];
          if (eb.y > zoneY.botEnd + 20 || eb.x < -20 || eb.x > W + 20) {
            enemyBullets.splice(i, 1);
            continue;
          }
          if (circleHit(eb.x, eb.y, eb.r, player.x, player.y, PLAYER_HIT_R)) {
            enemyBullets.splice(i, 1);
            hitPlayer();
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          let hit = false;
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (e.spawnShield > 0 && !b.bombShard) continue;
            if (rectCircleHit(e.x, e.y, e.w, e.h, b.x, b.y, b.r)) {
              e.hp -= b.dmg;
              hit = true;
              if (e.kind === "boss" && e.hp > 0 && Math.random() < 0.2) {
                spawnPowerOrb(e.x + (Math.random() - 0.5) * 36, e.y + 14, "energy");
              }
              if (e.hp <= 0) killEnemy(e, j);
              break;
            }
          }
          if (hit) bullets.splice(i, 1);
        }

        updateParticles(dt);
        if (victorySeq) updateVictory(dt);
      }

      function drawBg() {
        const grdTop = ctx.createLinearGradient(0, 0, 0, zoneY.mid);
        grdTop.addColorStop(0, "#0f2840");
        grdTop.addColorStop(1, "#1a3a5c");
        ctx.fillStyle = grdTop;
        ctx.fillRect(0, 0, W, zoneY.mid);

        const grdMid = ctx.createLinearGradient(0, zoneY.mid, 0, zoneY.bot);
        grdMid.addColorStop(0, "#1a2d4a");
        grdMid.addColorStop(0.5, "#243a32");
        grdMid.addColorStop(1, "#1a2d4a");
        ctx.fillStyle = grdMid;
        ctx.fillRect(0, zoneY.mid, W, zoneY.bot - zoneY.mid);

        const grdBot = ctx.createLinearGradient(0, zoneY.bot, 0, zoneY.botEnd);
        grdBot.addColorStop(0, "#0d1f35");
        grdBot.addColorStop(1, "#0a1628");
        ctx.fillStyle = grdBot;
        ctx.fillRect(0, zoneY.bot, W, zoneY.botEnd - zoneY.bot);

        for (let i = 0; i < 7; i++) {
          const mx = ((time * 10 + i * 110) % (W + 100)) - 50;
          const my = zoneY.mid + (zoneY.bot - zoneY.mid) * (0.12 + i * 0.11);
          const rw = 24 + (i % 3) * 6;
          ctx.fillStyle = `rgba(100, 140, 180, ${0.14 + (i % 2) * 0.06})`;
          ctx.beginPath();
          ctx.ellipse(mx, my, rw, 9, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawRaidenFighter(x, y, palette) {
        const body = palette.body || COLORS.p1;
        const wing = palette.wing || "#7aa8d0";
        const cockpit = palette.cockpit || "#e8f4ff";
        const engine = palette.engine || COLORS.p1Glow;
        const accent = palette.accent || "#2a5080";

        ctx.save();
        ctx.translate(x, y);
        ctx.shadowColor = engine;
        ctx.shadowBlur = 12;

        ctx.fillStyle = wing;
        ctx.beginPath();
        ctx.moveTo(-22, 4);
        ctx.lineTo(-8, -2);
        ctx.lineTo(8, -2);
        ctx.lineTo(22, 4);
        ctx.lineTo(8, 6);
        ctx.lineTo(-8, 6);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.bezierCurveTo(6, -8, 7, 8, 5, 16);
        ctx.lineTo(0, 20);
        ctx.lineTo(-5, 16);
        ctx.bezierCurveTo(-7, 8, -6, -8, 0, -20);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.fillRect(-3, -6, 6, 14);

        ctx.fillStyle = cockpit;
        ctx.beginPath();
        ctx.ellipse(0, -8, 4.5, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = engine;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.ellipse(-7, 14, 3.5, 8, 0, 0, Math.PI * 2);
        ctx.ellipse(7, 14, 3.5, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        const flicker = 0.7 + Math.sin(time * 28) * 0.3;
        ctx.globalAlpha = flicker;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(-2, 18);
        ctx.lineTo(0, 28 + flicker * 6);
        ctx.lineTo(2, 18);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function drawPlayer() {
        const { x, y } = player;
        if (
          invuln > 0 &&
          shieldVisualT <= 0 &&
          Math.floor(time * 12) % 2 === 0
        )
          return;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(PLAYER_SCALE, PLAYER_SCALE);
        drawRaidenFighter(0, 0, {});
        ctx.restore();
      }

      function drawShieldBubble() {
        if (shieldVisualT <= 0) return;
        const pulse = 0.75 + Math.sin(time * 14) * 0.15;
        ctx.fillStyle = `rgba(80, 180, 255, ${0.14 * pulse})`;
        ctx.strokeStyle = `rgba(140, 230, 255, ${0.65 * pulse})`;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = "#4da6ff";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 22 + Math.sin(time * 10) * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      function drawBombOrb(orb) {
        ctx.save();
        ctx.translate(orb.x, orb.y);
        const grd = ctx.createRadialGradient(0, 0, 2, 0, 0, 14);
        grd.addColorStop(0, "#fff8d0");
        grd.addColorStop(0.5, "#ffb830");
        grd.addColorStop(1, "#e85a10");
        ctx.fillStyle = grd;
        ctx.shadowColor = "#ffb830";
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.bezierCurveTo(9, -4, 9, 8, 0, 14);
        ctx.bezierCurveTo(-9, 8, -9, -4, 0, -12);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.6)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawSpawnWarnings() {
        for (const p of pendingSpawns) {
          const pulse = 0.5 + Math.sin(time * 18) * 0.35;
          ctx.strokeStyle =
            p.route === "skyTop"
              ? "#c8a0ff"
              : p.route === "top"
                ? "#7ad4ff"
                : p.route === "right"
                  ? "#ff8866"
                  : "#ffaa55";
          ctx.globalAlpha = pulse;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          if (p.route === "skyTop" || p.route === "top") {
            ctx.moveTo(p.tx - 14, p.ty);
            ctx.lineTo(p.tx + 14, p.ty);
            ctx.moveTo(p.tx, p.ty - 10);
            ctx.lineTo(p.tx, p.ty + 6);
          } else if (p.route === "right") {
            ctx.moveTo(p.tx - 6, p.ty - 12);
            ctx.lineTo(p.tx + 10, p.ty);
            ctx.lineTo(p.tx - 6, p.ty + 12);
          } else {
            ctx.moveTo(p.tx + 6, p.ty - 12);
            ctx.lineTo(p.tx - 10, p.ty);
            ctx.lineTo(p.tx + 6, p.ty + 12);
          }
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }
      }

      function drawEnemyShield(e) {
        if (e.spawnShield <= 0 || e.kind === "boss") return;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.strokeStyle = `rgba(120, 220, 255, ${0.35 + (e.spawnShield % 0.3)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, Math.max(e.w, e.h) * 0.75, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawTelegraphs() {
        drawSpawnWarnings();
        for (const t of telegraphs) {
          ctx.strokeStyle = t.color;
          ctx.globalAlpha = Math.max(0, t.life * 2);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      function drawHelicopter(e) {
        const rot = time * 14;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = COLORS.enemy;
        ctx.fillRect(-e.w / 2, -4, e.w, 12);
        ctx.fillStyle = COLORS.enemyDark;
        ctx.fillRect(-6, -10, 12, 8);
        ctx.strokeStyle = "rgba(200,220,180,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, -14, e.w * 0.55, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.save();
        ctx.rotate(rot);
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-16, 0);
        ctx.lineTo(16, 0);
        ctx.moveTo(0, -16);
        ctx.lineTo(0, 16);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = "#ff8040";
        ctx.beginPath();
        ctx.arc(e.w / 2 - 2, 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawJetEnemy(e) {
        const faceRight = (e.vx ?? e.speed) > 0;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.scale(faceRight ? -1 : 1, 1);
        ctx.fillStyle = "#4a5a6a";
        ctx.beginPath();
        ctx.moveTo(14, 0);
        ctx.lineTo(-10, -9);
        ctx.lineTo(-6, 0);
        ctx.lineTo(-10, 9);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#ff6060";
        ctx.shadowColor = "#ff4040";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(-4, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function drawHeavyEnemy(e) {
        const rot = time * 10;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = "#4a5568";
        ctx.fillRect(-e.w / 2, -6, e.w, 14);
        ctx.fillStyle = "#6a4050";
        ctx.fillRect(-10, -12, 20, 10);
        ctx.strokeStyle = "rgba(255,180,120,0.75)";
        ctx.lineWidth = 2;
        ctx.strokeRect(-e.w / 2 + 2, -4, e.w - 4, 10);
        ctx.save();
        ctx.rotate(rot);
        ctx.strokeStyle = "rgba(255,220,180,0.5)";
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(18, 0);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = "#ff7040";
        ctx.beginPath();
        ctx.arc(e.w / 2 - 4, 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawTankEnemy(e) {
        ctx.save();
        ctx.translate(e.x, e.y);
        const dir = (e.vx ?? e.speed) >= 0 ? 1 : -1;
        ctx.scale(dir, 1);
        ctx.fillStyle = "#3a4858";
        ctx.fillRect(-e.w / 2, -e.h / 2 + 4, e.w, e.h - 6);
        ctx.fillStyle = "#2a3540";
        ctx.fillRect(-e.w / 2 + 4, -e.h / 2, e.w - 8, 10);
        ctx.fillStyle = "#5a6878";
        ctx.fillRect(-8, -2, 16, 14);
        ctx.fillStyle = "#ff5030";
        ctx.beginPath();
        ctx.arc(-e.w / 2 + 8, 6, 4, 0, Math.PI * 2);
        ctx.arc(e.w / 2 - 8, 6, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#8898a8";
        ctx.fillRect(e.w / 2 - 6, -2, 14, 5);
        ctx.restore();
      }

      function drawStrikerEnemy(e) {
        const faceRight = (e.vx ?? e.speed) > 0;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.scale(faceRight ? -1 : 1, 1);
        ctx.fillStyle = "#6a5090";
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-8, -7);
        ctx.lineTo(-4, 0);
        ctx.lineTo(-8, 7);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#c080ff";
        ctx.shadowColor = "#e0a0ff";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(-2, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ff60a0";
        ctx.fillRect(8, -1, 5, 2);
        ctx.restore();
      }

      function drawDroneEnemy(e) {
        const rot = time * 16;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = "#5a6880";
        ctx.beginPath();
        ctx.ellipse(0, 0, e.w * 0.45, e.h * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#88a8c8";
        ctx.fillRect(-4, -6, 8, 10);
        ctx.strokeStyle = "rgba(180,220,255,0.6)";
        ctx.lineWidth = 1.5;
        ctx.save();
        ctx.rotate(rot);
        ctx.beginPath();
        ctx.moveTo(-14, 0);
        ctx.lineTo(14, 0);
        ctx.moveTo(0, -14);
        ctx.lineTo(0, 14);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = "#40d0ff";
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawBomberEnemy(e) {
        const faceRight = (e.vx ?? e.speed) > 0;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.scale(faceRight ? -1 : 1, 1);
        ctx.fillStyle = "#4a3848";
        ctx.beginPath();
        ctx.moveTo(-16, 4);
        ctx.lineTo(12, -8);
        ctx.lineTo(16, 0);
        ctx.lineTo(12, 8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6a5060";
        ctx.fillRect(-8, -4, 16, 10);
        ctx.fillStyle = "#ff6040";
        ctx.beginPath();
        ctx.arc(-10, 6, 4, 0, Math.PI * 2);
        ctx.arc(8, 6, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#8898a8";
        ctx.fillRect(10, -2, 10, 4);
        ctx.restore();
      }

      function drawEnemyHpBar(e) {
        if (!e.maxHp || e.maxHp <= 2 || e.kind === "boss") return;
        const ratio = Math.max(0, e.hp / e.maxHp);
        const barW = e.w * 0.95;
        const bx = e.x - barW / 2;
        const by = e.y - e.h / 2 - 12;
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(bx, by, barW, 4);
        ctx.fillStyle = ratio < 0.35 ? "#ff5050" : "#44cc88";
        ctx.fillRect(bx, by, barW * ratio, 4);
      }

      function drawBoss(e) {
        const pulse = 0.82 + Math.sin(time * 4.5) * 0.18;
        const spin = time * 1.6;
        const w = e.w;
        const h = e.h;
        const hpRatio = Math.max(0, e.hp / 120);
        const rage = hpRatio < 0.45;

        ctx.save();
        ctx.translate(e.x, e.y);

        // 外層能量場（雙環）
        for (let ring = 0; ring < 2; ring++) {
          const r = w * (0.48 + ring * 0.12) * pulse;
          ctx.strokeStyle = rage
            ? `rgba(255, 80, 120, ${0.15 + ring * 0.1})`
            : `rgba(255, 180, 80, ${0.12 + ring * 0.08})`;
          ctx.lineWidth = ring === 0 ? 2 : 1;
          ctx.setLineDash(ring === 0 ? [] : [6, 8]);
          ctx.beginPath();
          ctx.ellipse(0, 2, r, r * 0.55, ring * 0.3 + spin * 0.05, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        // 側翼装甲
        ctx.shadowColor = rage ? "#ff3060" : "#ff8040";
        ctx.shadowBlur = 22 * pulse;
        const wingGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
        wingGrad.addColorStop(0, "#2a1018");
        wingGrad.addColorStop(0.35, "#4a2028");
        wingGrad.addColorStop(0.5, "#5a2830");
        wingGrad.addColorStop(0.65, "#4a2028");
        wingGrad.addColorStop(1, "#2a1018");
        ctx.fillStyle = wingGrad;
        ctx.beginPath();
        ctx.moveTo(-w / 2 - 6, 10);
        ctx.lineTo(-w / 2 + 8, -h / 2 - 4);
        ctx.lineTo(-w / 2 + 22, -h / 2 + 6);
        ctx.lineTo(-w / 2 + 14, 12);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(w / 2 + 6, 10);
        ctx.lineTo(w / 2 - 8, -h / 2 - 4);
        ctx.lineTo(w / 2 - 22, -h / 2 + 6);
        ctx.lineTo(w / 2 - 14, 12);
        ctx.closePath();
        ctx.fill();

        // 主艦體
        const hullGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
        hullGrad.addColorStop(0, "#6a2830");
        hullGrad.addColorStop(0.4, "#3a1818");
        hullGrad.addColorStop(1, "#1a0c10");
        ctx.fillStyle = hullGrad;
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 4, 14);
        ctx.lineTo(-w / 2 + 16, -h / 2 + 2);
        ctx.lineTo(0, -h / 2 - 6);
        ctx.lineTo(w / 2 - 16, -h / 2 + 2);
        ctx.lineTo(w / 2 - 4, 14);
        ctx.lineTo(0, h / 2 - 2);
        ctx.closePath();
        ctx.fill();

        // 金色裝甲帶
        ctx.fillStyle = COLORS.gold;
        ctx.fillRect(-w / 2 + 14, -2, w - 28, 8);
        ctx.fillStyle = "#c9a227";
        ctx.fillRect(-w / 2 + 18, 6, w - 36, 3);

        // 艦橋
        ctx.fillStyle = "#2a3040";
        ctx.fillRect(-12, -h / 2 + 4, 24, 16);
        ctx.fillStyle = "#88ccff";
        ctx.globalAlpha = 0.5 + pulse * 0.3;
        ctx.fillRect(-8, -h / 2 + 8, 16, 6);
        ctx.globalAlpha = 1;

        // 四門砲塔
        const turretXs = [-30, -10, 10, 30];
        for (let i = 0; i < turretXs.length; i++) {
          const tx = turretXs[i];
          const aim = Math.sin(time * 3 + i * 1.2) * 0.15;
          ctx.save();
          ctx.translate(tx, -h / 2 + 2);
          ctx.rotate(aim);
          ctx.fillStyle = "#442228";
          ctx.fillRect(-7, -10, 14, 12);
          ctx.fillStyle = "#221018";
          ctx.fillRect(-3, -16, 6, 8);
          const tg = ctx.createRadialGradient(0, -14, 0, 0, -14, 5);
          tg.addColorStop(0, rage ? "#fff" : "#ffcc88");
          tg.addColorStop(0.5, rage ? "#ff4060" : "#ff6040");
          tg.addColorStop(1, "#801020");
          ctx.fillStyle = tg;
          ctx.beginPath();
          ctx.arc(0, -14, 4.5, 0, Math.PI * 2);
          ctx.fill();
          if (rage && Math.sin(time * 20 + i) > 0.6) {
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fillRect(-1, -22, 2, 6);
          }
          ctx.restore();
        }

        // 中央能量核心
        const coreR = 12 + pulse * 3;
        const coreGrad = ctx.createRadialGradient(0, 4, 0, 0, 4, coreR);
        coreGrad.addColorStop(0, "#ffffff");
        coreGrad.addColorStop(0.25, rage ? "#ff80c0" : "#ffe080");
        coreGrad.addColorStop(0.6, rage ? "#ff2040" : "#ff8020");
        coreGrad.addColorStop(1, "rgba(80,0,20,0)");
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(0, 4, coreR, 0, Math.PI * 2);
        ctx.fill();

        // 旋轉雷達盤
        ctx.save();
        ctx.rotate(spin);
        ctx.strokeStyle = `rgba(120, 200, 255, ${0.35 + pulse * 0.2})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, -6, 18, 6, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "rgba(80,160,220,0.25)";
        ctx.fillRect(-2, -18, 4, 24);
        ctx.restore();

        // 尾焰／引擎
        for (const ex of [-22, 22]) {
          const fl = 10 + Math.sin(time * 24 + ex) * 4;
          const fg = ctx.createLinearGradient(ex, 12, ex, 12 + fl);
          fg.addColorStop(0, "#ffcc60");
          fg.addColorStop(0.5, "#ff6020");
          fg.addColorStop(1, "rgba(255,32,0,0)");
          ctx.fillStyle = fg;
          ctx.beginPath();
          ctx.moveTo(ex - 5, 12);
          ctx.lineTo(ex + 5, 12);
          ctx.lineTo(ex, 12 + fl);
          ctx.closePath();
          ctx.fill();
        }

        // 裝飾面板線
        ctx.strokeStyle = "rgba(255, 213, 74, 0.25)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 20, 0);
        ctx.lineTo(w / 2 - 20, 0);
        ctx.moveTo(0, -h / 2);
        ctx.lineTo(0, h / 2 - 6);
        ctx.stroke();

        // 血條
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(-w / 2 + 6, -h / 2 - 18, w - 12, 8);
        const barGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
        barGrad.addColorStop(0, "#ff4040");
        barGrad.addColorStop(0.5, rage ? "#ff2060" : "#ff9040");
        barGrad.addColorStop(1, "#ff4040");
        ctx.fillStyle = barGrad;
        ctx.fillRect(-w / 2 + 8, -h / 2 - 16, (w - 16) * hpRatio, 4);
        ctx.strokeStyle = COLORS.gold;
        ctx.lineWidth = 1;
        ctx.strokeRect(-w / 2 + 8, -h / 2 - 16, w - 16, 4);

        // 低血量火花
        if (rage) {
          for (let s = 0; s < 3; s++) {
            const sx = Math.sin(time * 11 + s * 2.1) * w * 0.35;
            const sy = Math.cos(time * 9 + s * 1.7) * h * 0.2;
            ctx.globalAlpha = 0.35 + Math.abs(Math.sin(time * 15 + s * 2)) * 0.55;
            ctx.fillStyle = "#ffc864";
            ctx.beginPath();
            ctx.arc(sx, sy, 1.5 + Math.sin(time * 20 + s) * 0.8, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }

      function drawEnemies() {
        for (const e of enemies) {
          if (e.dying) {
            ctx.save();
            ctx.globalAlpha = 0.55 + Math.sin(time * 28) * 0.28;
          }
          if (e.kind === "boss") drawBoss(e);
          else if (e.kind === "striker") drawStrikerEnemy(e);
          else if (e.kind === "fast") drawJetEnemy(e);
          else if (e.kind === "heavy") drawHeavyEnemy(e);
          else if (e.kind === "tank") drawTankEnemy(e);
          else if (e.kind === "drone") drawDroneEnemy(e);
          else if (e.kind === "bomber") drawBomberEnemy(e);
          else drawHelicopter(e);
          drawEnemyShield(e);
          drawEnemyHpBar(e);
          if (e.dying) {
            ctx.strokeStyle = `rgba(128, 232, 255, ${0.45 + Math.sin(time * 32) * 0.25})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(e.x - e.w * 0.55, e.y - e.h * 0.55, e.w * 1.1, e.h * 1.1);
            ctx.restore();
          }
        }
      }

      function drawBullets() {
        for (const b of bullets) {
          const isShard = b.bombShard;
          for (let i = 0; i < b.trail.length; i++) {
            const t = b.trail[i];
