        skyIce.addColorStop(0, "rgba(100, 180, 255, 0.08)");
        skyIce.addColorStop(1, "rgba(140, 200, 255, 0.03)");
        ctx.fillStyle = skyIce;
        ctx.fillRect(0, 0, W, zoneY.mid);

        const grdMid = ctx.createLinearGradient(0, zoneY.mid, 0, zoneY.bot);
        grdMid.addColorStop(0, "#1a2838");
        grdMid.addColorStop(0.5, "#243040");
        grdMid.addColorStop(1, "#141c28");
        ctx.fillStyle = grdMid;
        ctx.fillRect(0, zoneY.mid, W, zoneY.bot - zoneY.mid);

        const midFog = ctx.createLinearGradient(0, zoneY.mid, 0, zoneY.bot);
        midFog.addColorStop(0, "rgba(160, 220, 255, 0.06)");
        midFog.addColorStop(1, "rgba(100, 160, 220, 0.02)");
        ctx.fillStyle = midFog;
        ctx.fillRect(0, zoneY.mid, W, zoneY.bot - zoneY.mid);

        drawFortressIceLayer();

        const grdBot = ctx.createLinearGradient(0, zoneY.bot, 0, zoneY.botEnd);
        grdBot.addColorStop(0, "#0c1420");
        grdBot.addColorStop(1, "#060a12");
        ctx.fillStyle = grdBot;
        ctx.fillRect(0, zoneY.bot, W, zoneY.botEnd - zoneY.bot);

        // 玩家區薄冰反光
        const gloss = ctx.createLinearGradient(0, zoneY.bot, 0, zoneY.botEnd);
        gloss.addColorStop(0, "rgba(160, 220, 255, 0.08)");
        gloss.addColorStop(0.5, "rgba(200, 240, 255, 0.04)");
        gloss.addColorStop(1, "rgba(80, 120, 180, 0.02)");
        ctx.fillStyle = gloss;
        ctx.fillRect(0, zoneY.bot, W, zoneY.botEnd - zoneY.bot);

        // 跑道導引燈
        for (let i = 0; i < 8; i++) {
          const lx = W * 0.2 + (i / 7) * W * 0.6;
          const pulse = 0.5 + Math.sin(time * 4 + i * 0.8) * 0.5;
          ctx.fillStyle = `rgba(120, 220, 180, ${0.25 + pulse * 0.35})`;
          ctx.beginPath();
          ctx.arc(lx, zoneY.botEnd - 14, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = "rgba(140, 200, 255, 0.4)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, zoneY.mid);
        ctx.lineTo(W, zoneY.mid);
        ctx.moveTo(0, zoneY.bot);
        ctx.lineTo(W, zoneY.bot);
        ctx.stroke();

        // 冰霧雲
        for (let i = 0; i < 8; i++) {
          const mx = ((time * 6 + i * 100) % (W + 100)) - 50;
          const my = zoneY.mid + (zoneY.bot - zoneY.mid) * (0.1 + i * 0.1);
          const rw = 28 + (i % 3) * 10;
          ctx.fillStyle = `rgba(180, 220, 255, ${0.08 + (i % 2) * 0.04})`;
          ctx.beginPath();
          ctx.ellipse(mx, my, rw, 9, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        for (let i = 0; i < 5; i++) {
          const mx = ((time * 10 + i * 75) % (W + 60)) - 30;
          const my = zoneY.mid * (0.12 + i * 0.15);
          ctx.fillStyle = `rgba(140, 180, 220, ${0.1 + Math.sin(time * 2.5 + i) * 0.03})`;
          ctx.beginPath();
          ctx.ellipse(mx, my, 32, 10, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawVents() {
        for (const v of vents) {
          ctx.fillStyle = "#2a3848";
          ctx.fillRect(v.x - 14, v.y - 2, 28, 10);
          ctx.fillStyle = "#3a4a5a";
          ctx.fillRect(v.x - 6, v.y - 10, 12, 10);
          ctx.fillStyle = "rgba(180, 220, 255, 0.4)";
          ctx.fillRect(v.x - 4, v.y - 8, 8, 3);
          if (v.warn > 0) {
            const pulse = 0.5 + Math.sin(time * 18) * 0.35;
            ctx.strokeStyle = `rgba(160, 220, 255, ${pulse})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(v.x, v.y);
            ctx.lineTo(v.x, v.y - 100);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.strokeStyle = `rgba(120, 200, 255, ${pulse * 0.6})`;
            ctx.beginPath();
            ctx.ellipse(v.x, v.y, 14 + pulse * 4, 5 + pulse * 2, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          if (v.fireT > 0) {
            const h = 110 * (v.fireT / 1.1);
            const g = ctx.createLinearGradient(v.x, v.y, v.x, v.y - h);
            g.addColorStop(0, "rgba(220, 245, 255, 0.9)");
            g.addColorStop(0.35, "rgba(140, 200, 255, 0.65)");
            g.addColorStop(0.7, "rgba(80, 160, 240, 0.25)");
            g.addColorStop(1, "rgba(60, 120, 200, 0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.moveTo(v.x - 12, v.y);
            ctx.quadraticCurveTo(v.x - 6, v.y - h * 0.6, v.x, v.y - h);
            ctx.quadraticCurveTo(v.x + 6, v.y - h * 0.6, v.x + 12, v.y);
            ctx.closePath();
            ctx.fill();
            for (let s = 0; s < 5; s++) {
              const sx = v.x + Math.sin(time * 14 + s * 2) * 10;
              const sy = v.y - h * (0.3 + s * 0.14);
              ctx.fillStyle = `rgba(200, 235, 255, ${0.55 * v.fireT})`;
              ctx.beginPath();
              ctx.arc(sx, sy, 2 + (s % 2), 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      function drawEmberPools() {
        for (const p of emberPools) {
          const phase = frostPhase(p);
          if (phase === "done") continue;

          if (phase === "warn") {
            const t = p.age / p.warnDur;
            const pulse = 0.5 + Math.sin(time * 16 + p.seed) * 0.35;
            ctx.strokeStyle = `rgba(180, 230, 255, ${pulse})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, 16 + t * 4, 7 + t * 2, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = `rgba(100, 180, 255, ${0.08 + t * 0.12})`;
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, 12 + t * 3, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = `rgba(140, 200, 255, ${0.35 + pulse * 0.25})`;
            ctx.lineWidth = 1;
            for (let c = 0; c < 4; c++) {
              const a = (c / 4) * Math.PI * 2 + time * 2;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p.x + Math.cos(a) * (10 + t * 4), p.y + Math.sin(a) * 4);
              ctx.stroke();
            }
          } else if (phase === "erupt") {
            const t = (p.age - p.warnDur) / p.eruptDur;
            const h = 75 * Math.sin(t * Math.PI);
            const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y - h);
            g.addColorStop(0, "rgba(220, 245, 255, 0.95)");
            g.addColorStop(0.4, "rgba(120, 200, 255, 0.75)");
            g.addColorStop(1, "rgba(60, 140, 220, 0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.moveTo(p.x - 10, p.y);
            ctx.quadraticCurveTo(p.x - 5, p.y - h * 0.55, p.x, p.y - h);
            ctx.quadraticCurveTo(p.x + 5, p.y - h * 0.55, p.x + 10, p.y);
            ctx.closePath();
            ctx.fill();
            for (let d = 0; d < 6; d++) {
              const dx = p.x + Math.sin(time * 20 + p.seed + d) * 14;
              const dy = p.y - h * (0.28 + d * 0.12) - Math.abs(Math.sin(time * 12 + d)) * 5;
              ctx.fillStyle = `rgba(${180 + d * 10}, ${220 + d * 5}, 255, ${0.7 * (1 - t * 0.3)})`;
              ctx.beginPath();
              ctx.arc(dx, dy, 1.5 + d * 0.25, 0, Math.PI * 2);
              ctx.fill();
            }
          } else {
            const coolT = (p.age - p.warnDur - p.eruptDur) / p.coolDur;
            const a = (1 - coolT) * 0.3;
            ctx.fillStyle = `rgba(100, 180, 240, ${a})`;
            ctx.beginPath();
            ctx.ellipse(p.x, p.y + 2, 10 * (1 - coolT * 0.4), 4, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

        ctx.beginPath();

        ctx.lineTo(8, 6);
        ctx.lineTo(-8, 6);

        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(0, -20);

        ctx.lineTo(0, 20);
        ctx.lineTo(-5, 16);

        ctx.closePath();

        ctx.restore();
      }

      function drawEnemyHpBar(e) {
        if (!e.maxHp || e.maxHp <= 2 || e.kind === "boss") return;
        const ratio = Math.max(0, e.hp / e.maxHp);
        const barW = e.w * 0.95;
        const bx = e.x - barW / 2;
        const by = e.y - e.h / 2 - 12;
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(bx, by, barW, 4);
        ctx.fillStyle = ratio < 0.35 ? "#ff5050" : "#44cc88";
        ctx.fillRect(bx, by, barW * ratio, 4);
      }

      function drawBoss(e) {
        const breath = 0.82 + Math.sin(time * 4.2) * 0.18;
        const spin = e.spin || time * 1.4;
        const w = e.w;
        const h = e.h;
        const maxHp = e.maxHp || STAGE3_BOSS_HP;
        const hpRatio = Math.max(0, e.hp / maxHp);
        const phase = bossHpPhase(e);
        const phase3 = phase === 3;
        const phase2 = phase >= 2;
        const firing = e.fireCd < 0.15;

        ctx.save();
        ctx.translate(e.x, e.y);

        for (let ring = 0; ring < 2; ring++) {
          const r = w * (0.4 + ring * 0.09) * breath;
          ctx.strokeStyle = phase3
            ? `rgba(80, 180, 255, ${0.22 + ring * 0.1})`
            : `rgba(100, 160, 220, ${0.14 + ring * 0.07})`;
          ctx.lineWidth = ring === 0 ? 2 : 1.5;
          ctx.setLineDash(ring === 0 ? [] : [4, 5]);
          ctx.beginPath();
          ctx.ellipse(0, 2, r, r * 0.5, ring * 0.2 + spin * 0.03, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        ctx.shadowColor = phase3 ? "#4da6ff" : "#6090c0";
        ctx.shadowBlur = 22 * breath;
        const baseGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
        baseGrad.addColorStop(0, phase3 ? "#2a4058" : "#243040");
        baseGrad.addColorStop(0.5, "#1a2838");
        baseGrad.addColorStop(1, "#0c1018");
        ctx.fillStyle = baseGrad;
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 8, h / 2 - 2);
        ctx.quadraticCurveTo(-w / 2 + 4, 0, -w / 2 + 22, -h / 2 + 10);
        ctx.quadraticCurveTo(0, -h / 2 - 12 * breath, w / 2 - 22, -h / 2 + 10);
        ctx.quadraticCurveTo(w / 2 - 4, 0, w / 2 - 8, h / 2 - 2);
        ctx.quadraticCurveTo(0, h / 2 + 8, -w / 2 + 8, h / 2 - 2);
        ctx.closePath();
        ctx.fill();

        // 冰晶裝甲邊緣
        ctx.strokeStyle = `rgba(180, 230, 255, ${0.35 + breath * 0.15})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 16, -h / 2 + 14);
        ctx.lineTo(-w / 2 + 8, 0);
        ctx.lineTo(-w / 2 + 14, h / 2 - 8);
        ctx.moveTo(w / 2 - 16, -h / 2 + 14);
        ctx.lineTo(w / 2 - 8, 0);
        ctx.lineTo(w / 2 - 14, h / 2 - 8);
        ctx.stroke();

        for (const side of [-1, 1]) {
          const t = bossTurretOffset(e, side);
          ctx.strokeStyle = `rgba(100, 180, 255, ${phase2 ? 0.25 : 0.45})`;
          ctx.lineWidth = phase2 ? 1.5 : 2.5;
          ctx.setLineDash(phase2 ? [3, 4] : []);
          ctx.beginPath();
          ctx.moveTo(0, -h * 0.04);
          ctx.quadraticCurveTo(t.ox * 0.5, t.oy * 0.3, t.ox, t.oy);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.save();
          ctx.translate(t.ox, t.oy);
          drawBossTurret(ctx, side, phase3, firing && Math.sin(time * 20 + side) > 0);
          ctx.restore();
        }

        ctx.strokeStyle = "rgba(80, 120, 160, 0.95)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.06, w * 0.26, h * 0.13, 0, 0, Math.PI * 2);
        ctx.stroke();

        const coreScale = 1 + (breath - 1) * 0.35;
        ctx.save();
        ctx.scale(coreScale, coreScale);
        const coreR = 15 + breath * (phase3 ? 7 : 5);
        const coreGrad = ctx.createRadialGradient(0, -h * 0.06, 0, 0, -h * 0.06, coreR);
        coreGrad.addColorStop(0, "#ffffff");
        coreGrad.addColorStop(0.15, phase3 ? "#a0d8ff" : "#c0e8ff");
        coreGrad.addColorStop(0.5, phase3 ? "#2080e0" : "#4da6ff");
        coreGrad.addColorStop(1, "rgba(20, 60, 100, 0)");
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.06, coreR, coreR * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        for (let b = 0; b < 3; b++) {
          const bob = Math.sin(time * 6 + b * 2.1) * 4;
          ctx.globalAlpha = 0.3 + Math.sin(time * 8 + b) * 0.15;
          ctx.fillStyle = phase3 ? "#60b0ff" : "#90c8ff";
          ctx.beginPath();
          ctx.arc(
            Math.sin(time * 2 + b) * 8,
            -h * 0.06 + bob,
            3 + Math.sin(time * 9 + b) * 1.5,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        const plumeH = (phase3 ? 32 : phase2 ? 20 : 12) + Math.sin(time * 11) * 5;
        const plume = ctx.createLinearGradient(0, -h * 0.18, 0, -h * 0.18 - plumeH);
        plume.addColorStop(0, "rgba(220, 245, 255, 0.9)");
        plume.addColorStop(0.45, "rgba(120, 200, 255, 0.55)");
        plume.addColorStop(1, "rgba(60, 140, 220, 0)");
        ctx.fillStyle = plume;
        ctx.beginPath();
        ctx.moveTo(-12, -h * 0.16);
        ctx.quadraticCurveTo(0, -h * 0.18 - plumeH, 12, -h * 0.16);
        ctx.lineTo(7, -h * 0.1);
        ctx.lineTo(-7, -h * 0.1);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;

        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(-w / 2 + 6, -h / 2 - 22, w - 12, 8);
        const barGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
        barGrad.addColorStop(0, "#2060a0");
        barGrad.addColorStop(0.5, phase3 ? "#4da6ff" : "#60b0e8");
        barGrad.addColorStop(1, "#2060a0");
        ctx.fillStyle = barGrad;
        ctx.fillRect(-w / 2 + 8, -h / 2 - 20, (w - 16) * hpRatio, 4);
        ctx.strokeStyle = "rgba(160, 220, 255, 0.85)";
        ctx.lineWidth = 1;
        ctx.strokeRect(-w / 2 + 8, -h / 2 - 20, w - 16, 4);

        if (phase3) {
          for (let s = 0; s < 6; s++) {
            const sx = Math.sin(time * 12 + s * 2.2) * w * 0.36;
            const sy = -h * 0.08 + Math.cos(time * 9 + s * 1.8) * h * 0.22;
            ctx.globalAlpha = 0.45 + Math.abs(Math.sin(time * 17 + s)) * 0.45;
            ctx.fillStyle = s % 2 ? "#80c8ff" : "#d0ecff";
            ctx.beginPath();
            ctx.arc(sx, sy, 2 + Math.sin(time * 24 + s), 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }

      function drawEnemies() {
        for (const e of enemies) {
          if (e.dying) {
            ctx.save();
            ctx.globalAlpha = 0.55 + Math.sin(time * 28) * 0.28;
          }
          if (e.kind === "boss") drawBoss(e);
          else if (e.kind === "miniboss") drawMiniBoss(e);
          else if (e.kind === "storm") drawStormEnemy(e);
          else if (e.kind === "ember_drone") drawEmberDroneEnemy(e);
          else if (e.kind === "magma_grunt") drawMagmaGruntEnemy(e);
          else if (e.kind === "splitter") drawSplitterEnemy(e);
          else if (e.kind === "ember_bit") drawEmberBitEnemy(e);
          else if (e.kind === "harpy") drawHarpyEnemy(e);
          else if (e.kind === "warden2") drawWarden2Enemy(e);
          else drawMagmaGruntEnemy(e);
          drawEnemyShield(e);
          drawEnemyHpBar(e);
          if (e.dying) {
            ctx.strokeStyle = `rgba(128, 232, 255, ${0.45 + Math.sin(time * 32) * 0.25})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(e.x - e.w * 0.55, e.y - e.h * 0.55, e.w * 1.1, e.h * 1.1);
            ctx.restore();
          }
        }
      }

      function drawBullets() {
        for (const b of bullets) {
          const isShard = b.bombShard;
          for (let i = 0; i < b.trail.length; i++) {
            const t = b.trail[i];
            ctx.globalAlpha = 0.12 + i * 0.1;
            ctx.fillStyle = isShard ? "#ff9040" : COLORS.bulletEdge;
            ctx.beginPath();
            ctx.arc(t.x, t.y, b.r * 0.65, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          if (isShard) {
            const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
            grd.addColorStop(0, "#fff");
            grd.addColorStop(0.4, "#ffe080");
            grd.addColorStop(1, "#ff6020");
            ctx.fillStyle = grd;
            ctx.shadowColor = "#ffb830";
            ctx.shadowBlur = 10;
          } else {
            ctx.fillStyle = COLORS.bullet;
            ctx.shadowColor = COLORS.bulletEdge;
            ctx.shadowBlur = 6;
          }
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        for (const eb of enemyBullets) {
          if (eb.glow) {
            const grd = ctx.createRadialGradient(eb.x, eb.y, 0, eb.x, eb.y, eb.r * 2);
            grd.addColorStop(0, "#fff");
            grd.addColorStop(0.35, "#ff80c0");
            grd.addColorStop(1, "#ff2060");
            ctx.fillStyle = grd;
            ctx.shadowColor = "#ff6eb4";
            ctx.shadowBlur = 12;
          } else {
            ctx.fillStyle = COLORS.eBullet;
            ctx.shadowColor = "#ff6eb4";
            ctx.shadowBlur = 6;
          }
          ctx.beginPath();
          ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI * 2);
          ctx.fill();
          if (eb.glow) {
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(eb.x, eb.y, eb.r + 2, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.shadowBlur = 0;
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life * 2);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawPowerOrbs() {
        for (const orb of powerOrbs) {
          const def = PICKUP[orb.type];
          const pulse = 0.75 + Math.sin(time * 8 + orb.wobble) * 0.25;
          ctx.save();
          ctx.translate(orb.x, orb.y);
          const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 14 * pulse);
          grd.addColorStop(0, "#fff");
          grd.addColorStop(0.35, def.color);
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.shadowColor = def.glow;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(0, 0, 11 * pulse, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#1a2030";
          ctx.font = "bold 11px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(def.label, 0, 1);
          ctx.restore();
        }
      }

      function drawUltAura() {
        if (ultActiveT <= 0) return;
        ctx.strokeStyle = `rgba(255, 213, 74, ${0.25 + (ultActiveT % 0.4) * 0.5})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 21 + Math.sin(time * 20) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        drawBg();

        if (victorySeq) {
          drawParticles();
          drawPlayer();
          if (flash > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flash * 2.8})`;
            ctx.fillRect(0, 0, W, H);
          }
          drawVictory();
          return;
        }

        drawTelegraphs();
        drawVents();
        drawEmberPools();
        drawEnemies();
        drawPowerOrbs();
        for (const orb of bombOrbs) {
          if (orb.active) drawBombOrb(orb);
        }
        drawBullets();
        drawMissileLaserTracks();
        drawPlayerLaser();
        drawParticles();
        drawPlayer();
        drawShieldBubble();
        drawUltAura();
        drawAshOverlay();
        if (flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flash * (victorySeq ? 2.8 : 4)})`;
          ctx.fillRect(0, victorySeq ? 0 : zoneY.mid, W, victorySeq ? H : zoneY.bot - zoneY.mid);
        }
        drawVictory();
      }

      let last = 0;
      function loop(ts) {
        const dt = Math.min(0.033, (ts - last) / 1000 || 0);
        last = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function pointerToGame(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * W,
          y: ((clientY - rect.top) / rect.height) * H,
        };
      }

      function inPlayerZone(y) {
        return y >= zoneY.bot + 4 && y <= zoneY.botEnd - 4;
      }

      function canStartDrag(y, pointerType) {
        if (inPlayerZone(y)) return true;
        if (pointerType !== "mouse" && y >= zoneY.bot - 12 && y <= zoneY.botEnd) return true;
        return false;
      }

      function movePlayerTo(x, y) {
        player.x = x;
        player.y = y;
        clampPlayer();
      }

      function onDragStart(e, x, y) {
        if (!running || gameOver || victorySeq) return;
        if (!canStartDrag(y, e.pointerType || "mouse")) return;
        if (player.dragId != null && player.dragId !== e.pointerId) {
          player.dragging = false;
          player.dragId = null;
          document.getElementById("game-wrap").classList.remove("dragging");
        }
        if (player.dragId != null) return;
        player.dragging = true;
        player.dragId = e.pointerId;
        player.pointerType = e.pointerType || "mouse";
        try {
          canvas.setPointerCapture(e.pointerId);
        } catch (_) {}
        movePlayerTo(x, y);
        document.getElementById("game-wrap").classList.add("dragging");
      }

      function onDragMove(e, x, y) {
        if (!player.dragging || player.dragId !== e.pointerId) return;
        if (player.pointerType === "mouse" && !inPlayerZone(y)) {
          movePlayerTo(x, Math.min(y, zoneY.botEnd - 8));
          return;
        }
        movePlayerTo(x, y);
      }

      function onDragEnd(e) {
        if (player.dragId !== e.pointerId) return;
        player.dragging = false;
        player.dragId = null;
        document.getElementById("game-wrap").classList.remove("dragging");
        try {
          if (canvas.hasPointerCapture(e.pointerId)) {
            canvas.releasePointerCapture(e.pointerId);
          }
        } catch (_) {}
      }

      function bindHudTap(btn, handler) {
        let touchFired = false;
        btn.addEventListener("pointerdown", (e) => {
          if (btn.disabled) return;
          if (e.pointerType === "mouse") return;
          e.preventDefault();
          e.stopPropagation();
          touchFired = true;
          handler();
        });
        btn.addEventListener("click", (e) => {
          if (touchFired) {
            touchFired = false;
            e.preventDefault();
            return;
          }
          if (btn.disabled) return;
          handler();
        });
      }

      canvas.addEventListener(
        "pointerdown",
        (e) => {
          if (e.button !== 0 && e.pointerType === "mouse") return;
          const p = pointerToGame(e.clientX, e.clientY);
          if (!canStartDrag(p.y, e.pointerType || "mouse")) return;
          if (e.pointerType !== "mouse") e.preventDefault();
          onDragStart(e, p.x, p.y);
        },
        { passive: false },
      );
      canvas.addEventListener(
        "pointermove",
        (e) => {
          if (!player.dragging || player.dragId !== e.pointerId) return;
          const p = pointerToGame(e.clientX, e.clientY);
          onDragMove(e, p.x, p.y);
        },
        { passive: true },
      );
      canvas.addEventListener("pointerup", (e) => onDragEnd(e));
      canvas.addEventListener("pointercancel", (e) => onDragEnd(e));
      canvas.addEventListener("lostpointercapture", (e) => {
        if (player.dragId === e.pointerId) onDragEnd(e);
      });

      btnStart.addEventListener("click", () => {
        overlay.classList.add("hidden");
        resetGame({ bossTest: false });
      });

      btnBossTest.addEventListener("click", () => {
        overlay.classList.add("hidden");
        resetGame({ bossTest: true });
      });

      if (bossTestFromUrl) {
        btnBossTest.textContent = "Boss 試打（網址已啟用）";
      }

      bindHudTap(btnWeapon, () => {
        if (!running) return;
        cycleWeapon();
      });
      bindHudTap(btnBomb, () => useBomb());
      bindHudTap(btnShield, () => useShield());
      bindHudTap(btnUlt, () => useUltimate());

      window.addEventListener("resize", resize);
      resize();
      if (bossTestFromUrl) {
        overlay.classList.add("hidden");
        resetGame({ bossTest: true });
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
