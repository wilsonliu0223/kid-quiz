<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>天空射擊 · 關卡3 冰封空中要塞</title>
    <style>
      :root {
        --bg-deep: #080e1a;
        --zone-top: #0c1828;
        --zone-mid: #142030;
        --zone-bot: #0a1420;
        --line: #5a8ab8;
        --gold: #ffd54a;
        --p1-body: #a8c8e8;
        --p1-glow: #4da6ff;
        --enemy: #5a6b4a;
        --enemy-bullet: #ff4080;
        --hud-h: 58px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      html,
      body,
      canvas,
      #game-wrap {
        touch-action: none;
      }

      #hud,
      #hud .hud-btn,
      #overlay .big-btn,
      .back-home {
        touch-action: manipulation;
        pointer-events: auto;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg-deep);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #e8f4ff;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 520px;
        margin: 0 auto;
      }

      #topbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 13px;
        background: #081220;
        border-bottom: 1px solid var(--line);
      }

      #topbar strong {
        color: var(--gold);
        font-size: 15px;
      }

      .back-home {
        color: #8ec8ff;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        flex-shrink: 0;
      }

      .back-home:active {
        opacity: 0.75;
      }

      #game-wrap {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: none;
        touch-action: none;
      }

      #game-wrap.dragging canvas {
        cursor: none;
      }

      #hud {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: stretch;
        gap: 4px;
        padding: 6px 6px;
        background: #081220;
        border-top: 1px solid var(--line);
        position: relative;
        z-index: 5;
      }

      .hud-btn {
        border: 2px solid var(--line);
        background: #152a45;
        color: #e8f4ff;
        border-radius: 10px;
        min-height: 42px;
        min-width: 0;
        width: 100%;
        padding: 4px 2px;
        font-size: clamp(9px, 2.6vw, 12px);
        font-weight: 600;
        cursor: pointer;
        line-height: 1.15;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: normal;
        word-break: keep-all;
      }

      .hud-btn:active {
        transform: scale(0.96);
      }

      .hud-btn.active {
        border-color: var(--gold);
        box-shadow: 0 0 12px rgba(255, 213, 74, 0.35);
        color: var(--gold);
      }

      .hud-btn:disabled {
        opacity: 0.45;
        pointer-events: none;
      }

      #btn-missile:disabled:not(.on) {
        opacity: 0.45;
      }

      #btn-missile.on {
        opacity: 1;
        border-color: #d4a8ff;
        color: #fff4ff;
        background: linear-gradient(180deg, #4a3270 0%, #2a1848 100%);
        box-shadow:
          0 0 18px rgba(210, 140, 255, 0.75),
          0 0 6px rgba(255, 255, 255, 0.3);
        animation: missile-glow 0.85s ease-in-out infinite alternate;
      }

      @keyframes missile-glow {
        from {
          box-shadow:
            0 0 12px rgba(190, 120, 255, 0.55),
            0 0 4px rgba(255, 255, 255, 0.2);
        }
        to {
          box-shadow:
            0 0 22px rgba(230, 160, 255, 0.95),
            0 0 10px rgba(255, 255, 255, 0.4);
        }
      }

      #btn-bomb {
        border-color: #ff8c42;
        color: #ffb87a;
      }

      #btn-ult.ready {
        border-color: var(--gold);
        color: var(--gold);
        box-shadow: 0 0 14px rgba(255, 213, 74, 0.45);
      }

      #btn-weapon.laser-mode {
        border-color: #00d4ff;
        color: #a8f0ff;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }

      #btn-shield {
        border-color: #6ec8ff;
        color: #a8e4ff;
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 12, 24, 0.88);
        z-index: 10;
        padding: 20px;
        text-align: center;
      }

      #overlay.hidden {
        display: none;
      }

      #overlay h1 {
        font-size: 22px;
        color: var(--gold);
        margin-bottom: 8px;
      }

      #overlay p {
        font-size: 14px;
        line-height: 1.5;
        color: #a8c8e8;
        margin-bottom: 16px;
      }

      #overlay .big-btn {
        border: none;
        background: linear-gradient(180deg, #ffb830, #e88a10);
        color: #1a1200;
        font-size: 17px;
        font-weight: 700;
        padding: 14px 32px;
        border-radius: 14px;
        cursor: pointer;
      }

      .big-btn.secondary {
        margin-top: 10px;
        background: linear-gradient(180deg, #5a8ab0, #2a5080);
        color: #e8f4ff;
      }

      .hint {
        font-size: 11px;
        color: #6a8aa8;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <a href="../index.html" class="back-home">← 首頁</a>
        <span id="stage-label">關卡3</span>
        <strong id="score">0</strong>
        <span id="stats">♥♥♥ · P○○○ · 逃走 0</span>
      </div>
      <div id="game-wrap">
        <canvas id="game"></canvas>
        <div id="overlay">
          <div>
            <h1>天空射擊 · 冰封空中要塞</h1>
            <p>
              下格<strong>按住拖曳</strong>閃彈 · 自動射擊<br />
              天空<strong>極光層</strong>、雲層<strong>冰霧要塞帶</strong> · 注意<strong>結冰裂縫</strong>與<strong>高射炮</strong><br />
              <strong>50 秒</strong> 霜鐵炮艦 · <strong>110 秒</strong> 冰封雷霆要塞 Boss（三階段）<br />
              擊落敵機掉落 <strong>P／⚡／擴散／雷射／盾／導彈</strong>
            </p>
            <button type="button" class="big-btn" id="btn-start">開始</button>
            <button type="button" class="big-btn secondary" id="btn-boss-test">
              Boss 試打
            </button>
            <p class="hint">獨立試玩頁 · 網址加 <code>?boss=1</code> 也可直接試 Boss</p>
          </div>
        </div>
      </div>
      <div id="hud">
        <button type="button" class="hud-btn active" id="btn-weapon">直射彈</button>
        <button type="button" class="hud-btn" id="btn-shield" disabled>無敵盾 ×0</button>
        <button type="button" class="hud-btn" id="btn-missile" disabled>導彈</button>
        <button type="button" class="hud-btn" id="btn-bomb">炸彈 ×1</button>
        <button type="button" class="hud-btn" id="btn-ult" disabled>必殺 0/3</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const statsEl = document.getElementById("stats");
      const overlay = document.getElementById("overlay");
      const btnStart = document.getElementById("btn-start");
      const btnBossTest = document.getElementById("btn-boss-test");
      const btnWeapon = document.getElementById("btn-weapon");
      const btnBomb = document.getElementById("btn-bomb");
      const btnShield = document.getElementById("btn-shield");
      const btnMissile = document.getElementById("btn-missile");
      const btnUlt = document.getElementById("btn-ult");

      const PICKUP = {
        energy: { label: "⚡", color: "#ffe080", glow: "#4da6ff" },
        spread: { label: "S", color: "#ffb830", glow: "#ff8040" },
        laser: { label: "L", color: "#80e8ff", glow: "#00d4ff" },
        shield: { label: "盾", color: "#a8e4ff", glow: "#4da6ff" },
        missile: { label: "M", color: "#e0c8ff", glow: "#a060ff" },
        power: { label: "P", color: "#ffb830", glow: "#ff8040" },
      };

      const POWER_MAX = 3;
      const POWER_OFFSETS = [
        [0],
        [-10, 10],
        [-12, 0, 12],
        [-16, -8, 0, 8, 16],
      ];

      const WEAPON_LABELS = {
        straight: "直射彈",
        spread: "擴散彈",
        laser: "雷射彈",
      };

      const ZONE = { top: 0.22, mid: 0.48, bot: 0.3 };
      const COLORS = {
        p1: "#a8c8e8",
        p1Glow: "#4da6ff",
        bullet: "#fff6a0",
        bulletEdge: "#ffb830",
        enemy: "#5a6b4a",
        enemyDark: "#2d3a24",
        eBullet: "#ff4080",
        boss: "#8b3030",
        gold: "#ffd54a",
      };

      let W = 0;
      let H = 0;
      let zoneY = { top: 0, mid: 0, bot: 0, botEnd: 0 };
      let running = false;
      let gameOver = false;
      let won = false;
      let time = 0;
      let score = 0;
      let escaped = 0;
      let lives = 3;
      let invuln = 0;
      let bombs = 1;
      let energy = 0;
      let shieldStock = 0;
      let powerLevel = 0;
      let hasSpread = false;
      let hasLaser = false;
      let missileAssistT = 0;
      let missileCd = 0;
      let shieldVisualT = 0;
      let ultActiveT = 0;
      let bossOrbCd = 5;
      let weapon = "straight";
      let fireCd = 0;
      let spawnCd = 0;
      let spawnCdSky = 0;
      let spawnCdMid = 0;
      let bossSpawned = false;
      let miniBossSpawned = false;
      let ashOverlayT = 0;
      const vents = [];
      const emberPools = [];
      let flash = 0;
      let campTime = 0;
      let bossTestMode = false;
      const bossTestFromUrl = new URLSearchParams(location.search).has("boss");

      const player = {
        x: 0,
        y: 0,
        w: 30,
        h: 27,
        dragging: false,
        dragId: null,
        pointerType: "mouse",
      };
      const PLAYER_SCALE = 0.75;
      const PLAYER_HIT_R = 10;
      const MISSILE_ASSIST_SEC = 5;
      const MISSILE_FIRE_INTERVAL = 1.45;
      const ENEMY_DEATH_LINGER_SEC = 0.4;
      const BOSS_HOMING_SEC = 3;
      const STAGE3_MINIBOSS_AT = 50;
      const STAGE3_BOSS_AT = 110;
      const STAGE3_MINIBOSS_HP = 95;
      const STAGE3_BOSS_HP = 380;
      const BOSS_HP = STAGE3_BOSS_HP;
      const VICTORY_EXPLODE_END = 3;
      const VICTORY_TOTAL_END = 6.5;
      const bullets = [];
      const enemyBullets = [];
      const enemies = [];
      const particles = [];
      const bombOrbs = [];
      const telegraphs = [];
      const pendingSpawns = [];
      const powerOrbs = [];
      const missileLaserTracks = [];
      let playerLaser = null;
      let victorySeq = null;

      function activateMissileAssist() {
        missileAssistT = Math.max(missileAssistT, MISSILE_ASSIST_SEC);
      }

      function clearMissileAssist() {
        missileAssistT = 0;
        missileLaserTracks.length = 0;
      }

      function zoneBounds() {
        zoneY.top = 0;
        zoneY.mid = H * ZONE.top;
        zoneY.bot = zoneY.mid + H * ZONE.mid;
        zoneY.botEnd = zoneY.bot + H * ZONE.bot;
      }

      function resize() {
        const wrap = document.getElementById("game-wrap");
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const prevW = W;
        const prevH = H;
        W = wrap.clientWidth;
        H = wrap.clientHeight;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (prevW > 0 && prevH > 0 && (prevW !== W || prevH !== H)) {
          const sx = W / prevW;
          const sy = H / prevH;
          const scaleEnt = (o) => {
            o.x *= sx;
            o.y *= sy;
          };
          player.x *= sx;
          player.y *= sy;
          for (const e of enemies) {
            scaleEnt(e);
            if (e.cruiseY != null) e.cruiseY *= sy;
          }
          for (const b of bullets) scaleEnt(b);
          for (const eb of enemyBullets) scaleEnt(eb);
          for (const o of powerOrbs) scaleEnt(o);
          for (const p of pendingSpawns) {
            p.tx *= sx;
            p.ty *= sy;
          }
        }
        zoneBounds();
        if (!running && !gameOver) {
          player.x = W / 2;
          player.y = zoneY.botEnd - 40;
        }
      }

      function clampPlayer() {
        const pad = 14;
        player.x = Math.max(pad, Math.min(W - pad, player.x));
        player.y = Math.max(
          zoneY.bot + pad,
          Math.min(zoneY.botEnd - pad - 6, player.y),
        );
      }

      function spawnBossNow() {
        if (bossSpawned) return;
        bossSpawned = true;
        bossOrbCd = 5;
        pendingSpawns.length = 0;
        for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i].kind !== "boss") enemies.splice(i, 1);
        }
        spawnEnemyAt({
          kind: "boss",
          route: "cruise",
          tx: 0,
          ty: 0,
        });
        const label = document.getElementById("stage-label");
        if (label) {
          label.textContent = bossTestMode ? "Boss 試打" : "冰封雷霆要塞！";
        }
        flash = 0.14;
      }

      function resetGame({ bossTest = false } = {}) {
        bossTestMode = bossTest;
        running = true;
        gameOver = false;
        won = false;
        time = 0;
        score = 0;
        escaped = 0;
        lives = 3;
        invuln = 0;
        bombs = bossTest ? 2 : 1;
        weapon = "straight";
        powerLevel = 0;
        hasSpread = false;
        hasLaser = false;
        playerLaser = null;
        clearMissileAssist();
        missileCd = 0;
        shieldVisualT = 0;
        fireCd = 0;
        spawnCd = 0;
        spawnCdSky = 0;
        spawnCdMid = 0;
        bossSpawned = false;
        miniBossSpawned = false;
        ashOverlayT = 0;
        vents.length = 0;
        emberPools.length = 0;
        flash = 0;
        bullets.length = 0;
        enemyBullets.length = 0;
        enemies.length = 0;
        particles.length = 0;
        bombOrbs.length = 0;
        telegraphs.length = 0;
        pendingSpawns.length = 0;
        powerOrbs.length = 0;
        missileLaserTracks.length = 0;
        victorySeq = null;
        energy = 0;
        shieldStock = 0;
        ultActiveT = 0;
        bossOrbCd = 5;
        campTime = 0;
        player.x = W / 2;
        player.y = zoneY.botEnd - 40;
        syncWeaponButton();
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0;
        document.getElementById("stage-label").textContent = bossTest
          ? "Boss 試打"
          : "關卡3 · 冰封空中要塞";
        updateHud();
        if (bossTest) spawnBossNow();
        updateHudButtons();
      }

      function getUnlockedWeapons() {
        const list = ["straight"];
        if (hasSpread) list.push("spread");
        if (hasLaser) list.push("laser");
        return list;
      }

      function cycleWeapon() {
        const list = getUnlockedWeapons();
        if (list.length <= 1) return;
        const i = list.indexOf(weapon);
        weapon = list[(i + 1) % list.length];
        syncWeaponButton();
      }

      function powerHudStr() {
        return `P${"●".repeat(powerLevel)}${"○".repeat(POWER_MAX - powerLevel)}`;
      }

      function getShotOffsets() {
        if (ultActiveT > 0) return [-8, 0, 8];
        return POWER_OFFSETS[powerLevel];
      }

      function syncWeaponButton() {
        btnWeapon.textContent = WEAPON_LABELS[weapon] || "直射彈";
        btnWeapon.classList.toggle("active", weapon !== "straight");
        btnWeapon.classList.toggle("laser-mode", weapon === "laser");
        btnWeapon.disabled = !running || gameOver;
      }

      function updateHudButtons() {
        btnShield.textContent = `無敵盾 ×${shieldStock}`;
        btnShield.disabled = shieldStock <= 0 || !running || gameOver;
        btnMissile.textContent =
          missileAssistT > 0 ? `導彈${Math.ceil(missileAssistT)}s` : "導彈";
        btnMissile.disabled = true;
        btnMissile.classList.toggle("on", missileAssistT > 0);
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0 || !running || gameOver;
        btnUlt.textContent = `必殺 ${energy}/3`;
        btnUlt.disabled = energy < 3 || !running || gameOver || ultActiveT > 0;
        btnUlt.classList.toggle("ready", energy >= 3);
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        const eStr = "⚡".repeat(energy) + "○".repeat(Math.max(0, 3 - energy));
        statsEl.textContent = `${"♥".repeat(lives)}${"♡".repeat(Math.max(0, 3 - lives))} · ${powerHudStr()} · ${eStr} · 逃走 ${escaped}`;
        updateHudButtons();
      }

      function spawnPowerOrb(x, y, type) {
        powerOrbs.push({
          type,
          x,
          y,
          vy: 22 + Math.random() * 16,
          wobble: Math.random() * Math.PI * 2,
          life: 11,
        });
      }

      function rollDropOnKill(kind, x, y) {
        const r = Math.random();
        if (kind === "magma_grunt" || kind === "ember_bit") {
          if (r < 0.24) spawnPowerOrb(x, y, "energy");
          else if (r < 0.4) spawnPowerOrb(x, y, "power");
          else if (r < 0.52) spawnPowerOrb(x, y, "spread");
          else if (r < 0.64) spawnPowerOrb(x, y, "laser");
          else if (r < 0.74) spawnPowerOrb(x, y, "shield");
          else if (r < 0.84) spawnPowerOrb(x, y, "missile");
        } else if (kind === "storm" || kind === "ember_drone") {
          if (r < 0.28) spawnPowerOrb(x, y, "energy");
          else if (r < 0.44) spawnPowerOrb(x, y, "power");
          else if (r < 0.58) spawnPowerOrb(x, y, "spread");
          else if (r < 0.72) spawnPowerOrb(x, y, "laser");
        } else if (kind === "splitter" || kind === "harpy") {
          if (r < 0.32) spawnPowerOrb(x, y, "energy");
          else if (r < 0.52) spawnPowerOrb(x, y, "power");
          else if (r < 0.68) spawnPowerOrb(x, y, "spread");
          else if (r < 0.82) spawnPowerOrb(x, y, "laser");
        } else if (kind === "warden2") {
          if (r < 0.4) spawnPowerOrb(x, y, "energy");
          else if (r < 0.65) spawnPowerOrb(x, y, "power");
          else if (r < 0.82) spawnPowerOrb(x, y, "shield");
          else spawnPowerOrb(x, y, "laser");
        } else if (kind === "miniboss") {
          if (r < 0.5) spawnPowerOrb(x, y, "power");
          else if (r < 0.75) spawnPowerOrb(x, y, "spread");
          else spawnPowerOrb(x, y, "missile");
        }
      }

      function collectPickup(type) {
        if (type === "energy") energy = Math.min(3, energy + 1);
        else if (type === "power") {
          const prev = powerLevel;
          powerLevel = Math.min(POWER_MAX, powerLevel + 1);
          if (powerLevel > prev) {
            explode(player.x, player.y - 8, "#ffb830", 6);
          }
        } else if (type === "spread") {
          hasSpread = true;
          weapon = "spread";
          syncWeaponButton();
        } else if (type === "laser") {
          hasLaser = true;
          weapon = "laser";
          syncWeaponButton();
        } else if (type === "shield") shieldStock += 1;
        else if (type === "missile") {
          activateMissileAssist();
          if (weapon === "laser") {
            const muzzle = laserMuzzle();
            flash = Math.max(flash, 0.12);
            explode(muzzle.x, muzzle.y, "#a8e4ff", 10);
          } else {
            missileCd = 0;
          }
        }
        updateHud();
      }

      function isPlayerCamping() {
        const botH = zoneY.botEnd - zoneY.bot;
        return (
          player.x < W * 0.3 &&
          player.y > zoneY.bot + botH * 0.45
        );
      }

      const ENEMY_KINDS = {
        storm: { hp: 2, w: 22, h: 18, speed: 88, speedVar: 18, score: 2, zone: "sky" },
        ember_drone: { hp: 2, w: 24, h: 18, speed: 72, speedVar: 14, score: 2, zone: "sky" },
        magma_grunt: { hp: 3, w: 30, h: 24, speed: 42, speedVar: 10, score: 2, zone: "mid" },
        splitter: { hp: 3, w: 28, h: 22, speed: 48, speedVar: 12, score: 3, zone: "mid" },
        ember_bit: { hp: 1, w: 14, h: 12, speed: 64, speedVar: 10, score: 1, zone: "mid" },
        harpy: { hp: 2, w: 26, h: 20, speed: 92, speedVar: 16, score: 3, zone: "mid" },
        warden2: { hp: 3, w: 30, h: 24, speed: 38, speedVar: 8, score: 4, zone: "mid" },
      };

      const WARDEN_SHIELD_SEC = 3;

      function hasWardenActive() {
        return enemies.some((e) => e.kind === "warden2");
      }

      function rollRareWarden() {
        if (time < 25 || bossSpawned || miniBossSpawned || hasWardenActive()) return false;
        return Math.random() < 0.045;
      }

      function enemyZone(e) {
        if (e.zone) return e.zone;
        const stat = ENEMY_KINDS[e.kind];
        if (stat?.zone) return stat.zone;
        if (e.kind === "miniboss") return "mid";
        return "mid";
      }

      function countEnemiesInZone(zone) {
        return enemies.filter((e) => e.kind !== "boss" && enemyZone(e) === zone).length;
      }

      function countPendingInZone(zone) {
        return pendingSpawns.filter((p) => p.zone === zone).length;
      }

      function enemyScore(kind) {
        if (kind === "miniboss") return 0;
        return ENEMY_KINDS[kind]?.score ?? (kind === "boss" ? 10 : 1);
      }

      function pickSpawnKindSky() {
        return Math.random() < 0.52 ? "storm" : "ember_drone";
      }

      /** 雲層區（冰霧要塞帶）敵機種類 */
      function pickSpawnKindMid(route) {
        if (rollRareWarden()) return "warden2";
        const r = Math.random();
        if (route === "top") {
          if (time > 45 && r < 0.14) return "splitter";
          if (r < 0.24) return "harpy";
          if (r < 0.48) return "magma_grunt";
          if (r < 0.66) return "splitter";
          return "ember_bit";
        }
        if (time > 50 && r < 0.12) return "harpy";
        if (r < 0.22) return "splitter";
        if (r < 0.48) return "magma_grunt";
        if (r < 0.62) return "harpy";
        return "magma_grunt";
      }

      function pickSpawnRouteMid() {
        const r = Math.random();
        if (campTime > 2.5) {
          if (r < 0.42) return "top";
          if (r < 0.71) return "left";
          return "right";
        }
        if (r < 0.34) return "top";
        if (r < 0.67) return "left";
        return "right";
      }

      /** 天空上區：雷暴層敵機 */
      function pickSpawnRouteSky() {
        const r = Math.random();
        if (r < 0.38) return "skyTop";
        if (r < 0.69) return "left";
        return "right";
      }

      function queueSpawnSky(warn = 0.42) {
        const route = pickSpawnRouteSky();
        const kind = pickSpawnKindSky();
        const skyBot = zoneY.mid - 28;
        let tx;
        let ty;
        if (route === "skyTop") {
          tx = 36 + Math.random() * (W - 72);
          ty = 14;
        } else {
          tx = route === "left" ? 22 : W - 22;
          ty = 24 + Math.random() * Math.max(40, skyBot - 48);
        }
        pendingSpawns.push({ kind, route, tx, ty, warn, zone: "sky" });
      }

      function queueSpawnMid(kind, warn = 0.55) {
        const midH = zoneY.bot - zoneY.mid;
        const route = pickSpawnRouteMid();
        const skyKinds = ["storm", "ember_drone"];
        const enemyKind =
          kind && !skyKinds.includes(kind) ? kind : pickSpawnKindMid(route);
        const warnMs = enemyKind === "warden2" ? 0.75 : warn;
        let tx;
        let ty;
        if (route === "top") {
          tx = 36 + Math.random() * (W - 72);
          ty = zoneY.mid + 14;
        } else {
          tx = route === "left" ? 22 : W - 22;
          ty = zoneY.mid + 24 + Math.random() * (midH - 48);
        }
        pendingSpawns.push({ kind: enemyKind, route, tx, ty, warn: warnMs, zone: "mid" });
      }

      function queueSpawn(kind, warn = 0.55) {
        queueSpawnMid(kind, warn);
      }

      function spawnSkyEnemy(kind, route, tx, ty) {
        const stat = ENEMY_KINDS[kind] || ENEMY_KINDS.storm;
        const spd = stat.speed + Math.random() * stat.speedVar;
        const cruiseY = Math.min(zoneY.mid - 32, ty + zoneY.mid * 0.22);
        if (route === "skyTop") {
          enemies.push({
            kind,
            zone: "sky",
            route,
            spawnShield: 0.35,
            movePhase: "drop",
            x: tx,
            y: ty,
            w: stat.w,
            h: stat.h,
            hp: stat.hp,
            maxHp: stat.hp,
            speed: spd,
            vx: spd * 0.4 * (Math.random() < 0.5 ? 1 : -1),
            dropVy: kind === "ember_drone" ? 72 : 88,
            cruiseY,
            fireCd: kind === "storm" ? 0.55 + Math.random() * 0.35 : 1.1 + Math.random() * 0.6,
            wobble: Math.random() * Math.PI * 2,
          });
        } else {
          enemies.push({
            kind,
            zone: "sky",
            route,
            spawnShield: 0.65,
            movePhase: "cruise",
            x: route === "left" ? -36 : W + 36,
            y: ty,
            w: stat.w,
            h: stat.h,
            hp: stat.hp,
            maxHp: stat.hp,
            speed: spd,
            vx: route === "left" ? spd : -spd,
            fireCd: kind === "storm" ? 0.6 + Math.random() * 0.4 : 1.2 + Math.random() * 0.5,
            wobble: Math.random() * Math.PI * 2,
          });
        }
      }

      function spawnMiniBossNow() {
        if (miniBossSpawned || bossSpawned) return;
        miniBossSpawned = true;
        const midH = zoneY.bot - zoneY.mid;
        enemies.push({
          kind: "miniboss",
          zone: "mid",
          route: "cruise",
          spawnShield: 1.2,
          movePhase: "cruise",
          x: W * 0.5,
          y: zoneY.mid + midH * 0.28,
          w: 76,
          h: 50,
          hp: STAGE3_MINIBOSS_HP,
          maxHp: STAGE3_MINIBOSS_HP,
          speed: 26,
          vx: 26,
          bossDir: 1,
          fireCd: 0.8,
          spin: 0,
        });
        flash = 0.12;
        const label = document.getElementById("stage-label");
        if (label) label.textContent = "霜鐵炮艦！";
      }

      function spawnEnemyAt(spec) {
        const midH = zoneY.bot - zoneY.mid;
        const { kind, route, tx, ty } = spec;
        const zone = spec.zone || (ENEMY_KINDS[kind]?.zone === "sky" ? "sky" : "mid");
        if (kind === "boss") {
          enemies.push({
            kind: "boss",
            route: "cruise",
            spawnShield: 0,
            movePhase: "cruise",
            x: W * 0.38,
            y: zoneY.mid + midH * 0.32,
            w: 92,
            h: 60,
            hp: STAGE3_BOSS_HP,
            maxHp: STAGE3_BOSS_HP,
            speed: 20,
            fireCd: 0.48,
            phase: 0,
            spin: 0,
            bossDir: 1,
            bossAtkIdx: 0,
          });
          return;
        }
        if (zone === "sky" || kind === "storm" || kind === "ember_drone") {
          spawnSkyEnemy(kind, route, tx, ty);
          return;
        }
        const stat = ENEMY_KINDS[kind] || ENEMY_KINDS.magma_grunt;
        const spd = stat.speed + Math.random() * stat.speedVar;
        const base = {
          zone: "mid",
          route,
          kind,
          spawnShield:
            kind === "warden2" ? WARDEN_SHIELD_SEC : route === "top" ? 0.5 : 1.0,
          movePhase: route === "top" ? "drop" : "cruise",
          w: stat.w,
          h: stat.h,
          hp: stat.hp,
          maxHp: stat.hp,
          speed: spd,
          fireCd:
            kind === "harpy"
              ? 1.2 + Math.random() * 0.7
              : kind === "splitter"
                ? 1.4 + Math.random() * 0.8
                : kind === "warden2"
                  ? 1.5 + Math.random() * 1.0
                  : kind === "ember_bit"
                    ? 1.6 + Math.random() * 0.6
                    : 1.3 + Math.random() * 1.0,
          dropVy:
            route === "top"
              ? kind === "harpy"
                ? 78
                : kind === "splitter"
                  ? 52
                  : 58
              : 0,
          wobble: kind === "ember_drone" ? Math.random() * Math.PI * 2 : 0,
          divePhase: kind === "harpy" ? "cruise" : null,
        };
        if (route === "top") {
          const cruiseFrac =
            kind === "harpy" ? 0.3 : kind === "splitter" ? 0.4 : 0.36;
          enemies.push({
            ...base,
            x: tx,
            y: ty,
            vx: spd * 0.35 * (Math.random() < 0.5 ? 1 : -1),
            cruiseY: ty + (zoneY.bot - zoneY.mid) * cruiseFrac,
            cruiseVy: kind === "harpy" ? 22 : 14,
          });
        } else if (route === "left") {
          enemies.push({ ...base, x: -44, y: ty, vx: spd });
        } else {
          enemies.push({ ...base, x: W + 44, y: ty, vx: -spd });
        }
      }

      function spawnEnemy(kind = "magma_grunt") {
        queueSpawn(kind);
      }

      function skySpawnRate() {
        if (bossSpawned) return 999;
        if (time < 40) return 1.1;
        if (time < 90) return 0.85;
        return 0.65;
      }

      function maxSkyEnemies() {
        if (time < 40) return 4;
        if (time < 90) return 5;
        return 6;
      }

      function spawnRate() {
        if (bossSpawned) return 999;
        if (time < 40) return 1.5;
        if (time < 90) return 1.0;
        return 0.75;
      }

      function maxEnemies() {
        if (time < 40) return 7;
        if (time < 90) return 9;
        return 11;
      }

      function maxMidEnemies() {
        return maxEnemies();
      }

      function laserMuzzle() {
        return { x: player.x, y: player.y - player.h * 0.35 };
      }

      function isMissileLaserTarget(e) {
        return e.kind === "boss" || e.spawnShield <= 0;
      }

      function missileTrackDps(e) {
        if (e.kind === "boss") return 0.35;
        if (e.kind === "storm") return 0.014;
        if (e.kind === "ember_drone") return 0.013;
        if (e.kind === "warden2") return 0.012;
        if (e.kind === "splitter") return 0.011;
        if (e.kind === "harpy") return 0.013;
        if (e.kind === "magma_grunt") return 0.01;
        return 0.028;
      }

      function beginEnemyDeath(e) {
        if (e.dying) return;
        e.dying = true;
        e.dyingT = ENEMY_DEATH_LINGER_SEC;
        e.hp = 0;
      }

      function updateMissileLaserTracks(dt) {
        if (missileAssistT <= 0 || weapon !== "laser") {
          missileLaserTracks.length = 0;
          return;
        }

        const list = enemies.filter(isMissileLaserTarget);

        for (let i = missileLaserTracks.length - 1; i >= 0; i--) {
          if (!enemies.includes(missileLaserTracks[i].target)) {
            missileLaserTracks.splice(i, 1);
          }
        }

        for (const e of list) {
          if (!missileLaserTracks.some((t) => t.target === e)) {
            missileLaserTracks.push({ target: e, pulse: Math.random() * 6 });
          }
        }

        for (let i = missileLaserTracks.length - 1; i >= 0; i--) {
          const t = missileLaserTracks[i];
          const e = t.target;
          if (!e || !enemies.includes(e)) {
            missileLaserTracks.splice(i, 1);
            continue;
          }
          t.pulse += dt * 16;
          if (e.dying) continue;
          if (e.spawnShield <= 0 || e.kind === "boss") {
            e.hp -= missileTrackDps(e) * dt * 60;
            if (e.hp <= 0) beginEnemyDeath(e);
          }
        }
      }

      function drawMissileLaserTracks() {
        if (!missileLaserTracks.length || weapon !== "laser") return;
        const muzzle = laserMuzzle();

        for (const t of missileLaserTracks) {
          const e = t.target;
          if (!e || !enemies.includes(e)) continue;
          const flicker =
            0.82 + Math.sin(t.pulse) * 0.12 + Math.sin(time * 38 + t.pulse) * 0.06;
          const tx = e.x;
          const ty = e.y;

          ctx.save();
          ctx.shadowColor = "#c060ff";
          ctx.shadowBlur = 14;
          ctx.strokeStyle = `rgba(168, 120, 255, ${0.7 * flicker})`;
          ctx.lineWidth = 7 * flicker;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(muzzle.x, muzzle.y);
          ctx.lineTo(tx, ty);
          ctx.stroke();
          ctx.strokeStyle = `rgba(200, 240, 255, ${0.88 * flicker})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(muzzle.x, muzzle.y);
          ctx.lineTo(tx, ty);
          ctx.stroke();
          ctx.fillStyle = `rgba(255,255,255,${0.9 * flicker})`;
          ctx.beginPath();
          ctx.arc(tx, ty, 3.5 * flicker, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.save();
        ctx.shadowColor = "#a060ff";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "rgba(220, 180, 255, 0.9)";
        ctx.beginPath();
        ctx.arc(muzzle.x, muzzle.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function firePlayer() {
        if (weapon === "laser" && ultActiveT <= 0) return;
        const speed = 420;
        const offsets = getShotOffsets();
        const powered = ultActiveT > 0;
        for (const off of offsets) {
          if (weapon === "straight" && !powered) {
            bullets.push({
              x: player.x + off,
              y: player.y - player.h * 0.4,
              vx: 0,
              vy: -speed,
              r: 4,
              dmg: 1,
              trail: [],
            });
          } else {
            const spreads = powered ? [-0.18, 0, 0.18] : [-0.22, 0, 0.22];
            for (const a of spreads) {
              bullets.push({
                x: player.x + off,
                y: player.y - player.h * 0.35,
                vx: Math.sin(a) * speed * 0.35,
                vy: -Math.cos(a) * speed * (powered ? 1.1 : 1),
                r: powered ? 4 : 3.5,
                dmg: powered ? 2 : 1,
                trail: [],
              });
            }
          }
        }
      }

      function updatePlayerLaser(dt) {
        const x = player.x;
        const y0 = player.y - player.h * 0.35;
        const top = 0;
        const beamW = 10 + powerLevel * 3.5;
        const half = beamW * 0.55;
        const dps = 4.8 + powerLevel * 0.9;
        playerLaser = { x, y0, top, pulse: (playerLaser?.pulse || 0) + dt * 14, beamW };

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (e.spawnShield > 0 || e.dying) continue;
          if (Math.abs(e.x - x) < half + e.w * 0.4 && e.y <= y0 && e.y >= top) {
            e.hp -= dps * dt * 60;
            if (e.hp <= 0) killEnemy(e, j);
            else if (e.kind === "boss" && Math.random() < 0.06)
              spawnPowerOrb(e.x, e.y + 10, "energy");
          }
        }
      }

      function drawPlayerLaser() {
        if (!playerLaser || weapon !== "laser" || ultActiveT > 0) return;
        const { x, y0, top, pulse, beamW } = playerLaser;
        const h = y0 - top;
        const flicker = 0.82 + Math.sin(pulse) * 0.12 + Math.sin(time * 42) * 0.06;
        const coreW = (3.5 + powerLevel * 0.4) * flicker;
        const midW = (beamW * 0.75) * flicker;

        ctx.save();
        ctx.shadowColor = "#00e5ff";
        ctx.shadowBlur = 18;

        const outer = ctx.createLinearGradient(x, y0, x, top);
        outer.addColorStop(0, "rgba(0, 220, 255, 0.55)");
        outer.addColorStop(0.35, "rgba(80, 200, 255, 0.28)");
        outer.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = outer;
        ctx.fillRect(x - midW * 1.4, top, midW * 2.8, h);

        const mid = ctx.createLinearGradient(x, y0, x, top);
        mid.addColorStop(0, "rgba(120, 240, 255, 0.9)");
        mid.addColorStop(0.5, "rgba(60, 180, 255, 0.65)");
        mid.addColorStop(1, "rgba(200,240,255,0)");
        ctx.fillStyle = mid;
        ctx.fillRect(x - midW, top, midW * 2, h);

        ctx.fillStyle = `rgba(255,255,255,${0.92 * flicker})`;
        ctx.fillRect(x - coreW * 0.5, top, coreW, h);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(x, y0 - 2, 5 * flicker, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function fireMissileAssist() {
        const side = Math.random() < 0.5 ? -14 : 14;
        bullets.push({
          x: player.x + side,
          y: player.y - 10,
          vx: side * 1.2,
          vy: -185,
          r: 4.5,
          dmg: 3,
          trail: [],
          homing: 0.3,
          missile: true,
        });
      }

      function useShield() {
        if (shieldStock <= 0 || gameOver) return;
        shieldStock -= 1;
        invuln = Math.max(invuln, 3.8);
        shieldVisualT = 3.8;
        flash = 0.08;
        updateHud();
      }

      function useUltimate() {
        if (energy < 3 || gameOver || ultActiveT > 0) return;
        energy -= 3;
        ultActiveT = 2.8;
        invuln = 0.6;
        flash = 0.1;
        updateHud();
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function bossMegaExplode(x, y, big = false) {
        const n = big ? 40 : 22;
        explode(x, y, "#ff5030", n);
        explode(x, y, "#ffb830", Math.floor(n * 0.65));
        explode(x, y, "#fff6a0", Math.floor(n * 0.45));
        explode(x, y, COLORS.boss, Math.floor(n * 0.35));
        flash = Math.max(flash, big ? 0.38 : 0.22);
        if (victorySeq) {
          victorySeq.rings.push({
            x,
            y,
            r: 10,
            life: 0.95,
            maxR: big ? 150 : 95,
          });
        }
      }

      function startBossVictory(x, y) {
        victorySeq = {
          phase: "explode",
          t: 0,
          x,
          y,
          burstCd: 0,
          bursts: 0,
          rings: [],
          bossTest: bossTestMode,
        };
        invuln = 99;
        bullets.length = 0;
        enemyBullets.length = 0;
        pendingSpawns.length = 0;
        bombOrbs.length = 0;
        powerOrbs.length = 0;
        missileLaserTracks.length = 0;
        playerLaser = null;
        clearMissileAssist();
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          explode(e.x, e.y, COLORS.enemy, 10);
          enemies.splice(i, 1);
        }
        bossMegaExplode(x, y, true);
      }

      function updateVictory(dt) {
        if (!victorySeq) return;
        victorySeq.t += dt;
        flash = Math.max(0, flash - dt * 0.4);

        if (victorySeq.phase === "explode") {
          victorySeq.burstCd -= dt;
          if (victorySeq.burstCd <= 0 && victorySeq.bursts < 14) {
            victorySeq.burstCd = 0.09 + victorySeq.bursts * 0.016;
            victorySeq.bursts++;
            const spread = victorySeq.bursts * 18;
            bossMegaExplode(
              victorySeq.x + (Math.random() - 0.5) * spread * 1.6,
              victorySeq.y + (Math.random() - 0.5) * spread * 0.8,
            );
          }
          if (victorySeq.t >= VICTORY_EXPLODE_END) victorySeq.phase = "banner";
        } else if (victorySeq.phase === "banner" && victorySeq.t >= VICTORY_TOTAL_END) {
          const wasBossTest = victorySeq.bossTest;
          victorySeq = null;
          endGame(true, wasBossTest);
          return;
        }

        for (const ring of victorySeq.rings) {
          ring.life -= dt;
          ring.r += (ring.maxR - ring.r) * dt * 5;
        }
        victorySeq.rings = victorySeq.rings.filter((r) => r.life > 0);
        updateParticles(dt);
      }

      function drawVictory() {
        if (!victorySeq) return;
        const { phase, t, x, y, bossTest } = victorySeq;

        for (const ring of victorySeq.rings) {
          ctx.strokeStyle = `rgba(255, 190, 70, ${ring.life * 0.8})`;
          ctx.lineWidth = 3 + (1 - ring.life) * 5;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (phase === "explode") {
          const core = Math.max(0, 1 - t / (VICTORY_EXPLODE_END - 0.2));
          const grd = ctx.createRadialGradient(x, y, 0, x, y, 60 + t * 55);
          grd.addColorStop(0, `rgba(255,255,220,${0.65 * core})`);
          grd.addColorStop(0.35, `rgba(255,120,30,${0.45 * core})`);
          grd.addColorStop(1, "rgba(255,40,10,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(x, y, 60 + t * 55, 0, Math.PI * 2);
          ctx.fill();
        }

        const showBanner = phase === "banner" || t > VICTORY_EXPLODE_END * 0.55;
        if (!showBanner) return;

        const bannerStart = VICTORY_EXPLODE_END * 0.55;
        const bannerT = t - bannerStart;
        const alpha = Math.min(1, bannerT / 0.5);
        const pulse = 0.92 + Math.sin(t * 9) * 0.06;
        const stageLine = bossTest ? "Boss 試打 · 通過" : "關卡3 · 冰封空中要塞 · 通過";

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        ctx.shadowColor = COLORS.gold;
        ctx.shadowBlur = 24;
        ctx.fillStyle = COLORS.gold;
        ctx.font = `bold ${32 * pulse}px sans-serif`;
        ctx.fillText("STAGE CLEAR!", W / 2, zoneY.mid + 22);
        ctx.font = `bold ${20 * pulse}px sans-serif`;
        ctx.fillStyle = "#e8f4ff";
        ctx.shadowBlur = 12;
        ctx.fillText(stageLine, W / 2, zoneY.mid + 56);
        if (phase === "banner" && bannerT > 0.6) {
          ctx.font = "13px sans-serif";
          ctx.fillStyle = "#8ec8ff";
          ctx.shadowBlur = 0;
          const dots = ".".repeat(1 + (Math.floor(t * 3) % 3));
          ctx.fillText(`準備成績${dots}`, W / 2, zoneY.mid + 86);
        }
        ctx.restore();
      }

      function explode(x, y, color, n = 8, lifeScale = 1) {
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 * i) / n + Math.random() * 0.3;
          const sp = 40 + Math.random() * 80;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: (0.35 + Math.random() * 0.25) * lifeScale,
            color,
          });
        }
      }

      function hitPlayer() {
        if (invuln > 0 || gameOver) return;
        lives -= 1;
        invuln = 1.2;
        if (powerLevel > 0) powerLevel -= 1;
        clearMissileAssist();
        explode(player.x, player.y, COLORS.p1Glow, 12);
        updateHud();
        if (lives <= 0) endGame(false);
      }

      function killEnemy(e, idx) {
        if (e.kind === "boss") {
          score += enemyScore(e.kind);
          const { x, y } = e;
          enemies.splice(idx, 1);
          updateHud();
          startBossVictory(x, y);
          return;
        }
        if (e.kind === "miniboss") {
          score += 8;
          explode(e.x, e.y, "#ff8040", 18, 1.4);
          rollDropOnKill("miniboss", e.x, e.y);
          enemies.splice(idx, 1);
          updateHud();
          return;
        }
        score += enemyScore(e.kind);
        if (e.kind === "splitter" && !e._splitChild) {
          for (const k of [-1, 1]) {
            enemies.push({
              kind: "ember_bit",
              zone: "mid",
              route: "cruise",
              spawnShield: 0,
              movePhase: "cruise",
              x: e.x + k * 10,
              y: e.y + 6,
              w: 14,
              h: 12,
              hp: 1,
              maxHp: 1,
              speed: 68,
              vx: k * 48,
              vy: 28,
              fireCd: 1.8,
              _splitChild: true,
            });
          }
        }
        explode(e.x, e.y, "#ff6030", 10, 1.35);
        explode(e.x, e.y, "#ffb830", 6, 1.2);
        rollDropOnKill(e.kind, e.x, e.y);
        enemies.splice(idx, 1);
        updateHud();
      }

      function endGame(win, bossTestWin = false) {
        gameOver = true;
        won = win;
        running = false;
        victorySeq = null;
        overlay.classList.remove("hidden");
        overlay.querySelector("h1").textContent = win
          ? bossTestWin
            ? "Boss 試打完成！"
            : "恭喜過關！"
          : "GAME OVER";
        overlay.querySelector("p").innerHTML = win
          ? `最終得分 <strong style="font-size:1.4em;color:#ffd54a">${score}</strong><br/>逃走 ${escaped} 隻 · 剩餘 ${"♥".repeat(lives)}<br/>太棒了，再挑戰一次？`
          : `得分 ${score} · 再試一次？<br/>拖曳下格閃開粉色敵彈`;
        btnStart.textContent = "再玩一次";
      }

      function useBomb() {
        if (bombs <= 0 || gameOver || bombOrbs.some((b) => b.active)) return;
        bombs -= 1;
        btnBomb.textContent = bombs > 0 ? `炸彈 ×${bombs}` : "炸彈 ×0";
        btnBomb.disabled = bombs <= 0;
        bombOrbs.push({
          active: true,
          phase: "launch",
          x: player.x,
          y: player.y - 8,
          vx: 0,
          vy: -280,
          targetY: zoneY.mid + (zoneY.bot - zoneY.mid) * 0.55,
          wobble: 0,
        });
      }

      function burstBomb(orb) {
        orb.active = false;
        flash = 0.18;
        const cx = orb.x;
        const cy = orb.y;
        explode(cx, cy, "#ffb830", 24);
        explode(cx, cy, "#fff6a0", 16);
        const rings = 3;
        const perRing = 18;
        for (let ring = 0; ring < rings; ring++) {
          const baseSp = 140 + ring * 55;
          for (let i = 0; i < perRing; i++) {
            const a = (Math.PI * 2 * i) / perRing + ring * 0.11;
            bullets.push({
              x: cx,
              y: cy,
              vx: Math.cos(a) * baseSp,
              vy: Math.sin(a) * baseSp,
              r: ring === 0 ? 5 : 4,
              dmg: ring === 0 ? 3 : 2,
              trail: [],
              bombShard: true,
              life: 1.2,
            });
          }
        }
        for (let i = 0; i < 36; i++) {
          const a = -Math.PI / 2 + (i / 35) * Math.PI * 0.95;
          bullets.push({
            x: cx,
            y: cy,
            vx: Math.cos(a) * (200 + Math.random() * 80),
            vy: Math.sin(a) * (200 + Math.random() * 80),
            r: 3.5,
            dmg: 2,
            trail: [],
            bombShard: true,
            life: 0.9,
          });
        }
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const eb = enemyBullets[i];
          if (Math.hypot(eb.x - cx, eb.y - cy) < 90) enemyBullets.splice(i, 1);
        }
      }

      function bossHpPhase(e) {
        const hpR = e.hp / (e.maxHp || STAGE3_BOSS_HP);
        if (hpR > 0.65) return 1;
        if (hpR > 0.3) return 2;
        return 3;
      }

      function bossTurretOffset(e, side) {
        const w = e.w;
        const phase = bossHpPhase(e);
        const spin = e.spin || 0;
        if (phase >= 2) {
          const ang = spin + (side < 0 ? Math.PI * 0.92 : -Math.PI * 0.08);
          const r = w * 0.46;
          return { ox: Math.cos(ang) * r, oy: Math.sin(ang) * r * 0.38 + 2 };
        }
        return {
          ox: side * w * 0.34,
          oy: Math.sin(time * 3.2 + side * 1.4) * 6,
        };
      }

      function drawBossTurret(ctx, side, phase3, firing) {
        ctx.save();
        ctx.shadowColor = phase3 ? "#80c8ff" : "#4da6ff";
        ctx.shadowBlur = firing ? 16 : 10;
        const rock = ctx.createLinearGradient(-12, -10, 12, 12);
        rock.addColorStop(0, "#4a5a6a");
        rock.addColorStop(1, "#2a3540");
        ctx.fillStyle = rock;
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(12, 2);
        ctx.lineTo(4, 14);
        ctx.lineTo(-4, 14);
        ctx.lineTo(-12, 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#3a4858";
        ctx.fillRect(-5, -6, 10, 10);
        const tg = ctx.createRadialGradient(0, -12, 0, 0, -12, 5);
        tg.addColorStop(0, phase3 ? "#fff" : "#e8f4ff");
        tg.addColorStop(0.5, phase3 ? "#4da6ff" : "#80c8ff");
        tg.addColorStop(1, "#204060");
        ctx.fillStyle = tg;
        ctx.beginPath();
        ctx.arc(0, -12, 5, 0, Math.PI * 2);
        ctx.fill();
        if (firing) {
          ctx.fillStyle = "rgba(200, 235, 255, 0.9)";
          ctx.fillRect(-2, -20, 4, 8);
        }
        ctx.strokeStyle = `rgba(160, 220, 255, ${phase3 ? 0.6 : 0.4})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(side * 8, 4);
        ctx.quadraticCurveTo(-side * 6, 10, -side * 14, 0);
        ctx.stroke();
        ctx.fillStyle = "rgba(200, 230, 255, 0.35)";
        ctx.fillRect(-8, 6, 16, 3);
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function bossPhase1Attack(e) {
        const px = player.x;
        const py = player.y;
        e.bossAtkIdx = (e.bossAtkIdx || 0) + 1;
        const mode = e.bossAtkIdx % 3;

        if (mode === 0) {
          // 左右炮塔：朝玩家扇形岩漿流（非全圓彈幕）
          for (const side of [-1, 1]) {
            const t = bossTurretOffset(e, side);
            const tx = e.x + t.ox;
            const ty = e.y + t.oy;
            const ang = Math.atan2(py - ty, px - tx);
            for (let k = -2; k <= 2; k++) {
              const a = ang + k * 0.09;
              enemyBullets.push({
                x: tx,
                y: ty - 6,
                vx: Math.cos(a) * (155 + k * 4),
                vy: Math.sin(a) * (155 + k * 4),
                r: 4.5,
                glow: true,
              });
            }
          }
        } else if (mode === 1) {
          // 爐心雙股岩漿瀑：向左右下方傾瀉（V 形，非放射圓）
          telegraphs.push({ x: e.x, y: e.y + 8, r: 6, maxR: 52, life: 0.38, color: "#80c8ff" });
          for (const side of [-1, 1]) {
            for (let i = 0; i < 6; i++) {
              const t = i / 5;
              const a = Math.PI / 2 + side * (0.28 + t * 0.22);
              const sp = 115 + i * 12;
              enemyBullets.push({
                x: e.x + side * (8 + i * 4),
                y: e.y - 2,
                vx: Math.cos(a) * sp,
                vy: Math.sin(a) * sp,
                r: 4.5 + (i % 2) * 0.5,
                glow: true,
              });
            }
          }
        } else {
          // 間歇泉柱：三股垂直岩漿雨落下
          for (let col = -1; col <= 1; col++) {
            const gx = e.x + col * 40;
            telegraphs.push({
              x: gx,
              y: e.y - 20,
              r: 4,
              maxR: 18,
              life: 0.35,
              color: "#a8e0ff",
            });
            for (let row = 0; row < 5; row++) {
              enemyBullets.push({
                x: gx + col * 6,
                y: e.y - 16 - row * 6,
                vx: col * 22 + (row - 2) * 8,
                vy: 95 + row * 22,
                r: 4,
                glow: true,
              });
            }
          }
        }

        let drones = enemies.filter((en) => en.kind === "ember_drone").length;
        if (mode === 1) {
          for (; drones < 2; drones++) {
            spawnSkyEnemy(
              "ember_drone",
              "skyTop",
              e.x + (drones === 0 ? -55 : 55),
              zoneY.mid * 0.1,
            );
          }
        }
      }

      function bossAttack(e) {
        e.spin = (e.spin || 0) + 0.45;
        const px = player.x;
        const py = player.y;
        const phase = bossHpPhase(e);

        if (phase === 1) {
          bossPhase1Attack(e);
        } else if (phase === 2) {
          ensureBossVents();
          triggerVentBurst();
          for (const side of [-1, 1]) {
            const t = bossTurretOffset(e, side);
            const tx = e.x + t.ox;
            const ty = e.y + t.oy;
            for (let i = 0; i < 6; i++) {
              const aDown = Math.PI / 2 + (i - 2.5) * 0.11;
              enemyBullets.push({
                x: tx,
                y: ty,
                vx: Math.cos(aDown) * 150,
                vy: Math.sin(aDown) * 150,
                r: 4.5,
                glow: true,
              });
              const aUp = -Math.PI / 2 + (i - 2.5) * 0.1;
              enemyBullets.push({
                x: tx,
                y: ty,
                vx: Math.cos(aUp) * 130,
                vy: Math.sin(aUp) * 130,
                r: 4,
                glow: true,
              });
            }
          }
        } else {
          ashOverlayT = Math.max(ashOverlayT, 3.0);
          const ang = Math.atan2(py - e.y, px - e.x);
          for (let k = -2; k <= 2; k++) {
            const a = ang + k * 0.09;
            enemyBullets.push({
              x: e.x,
              y: e.y - 2,
              vx: Math.cos(a) * 190,
              vy: Math.sin(a) * 190,
              r: 5,
              glow: true,
              homing: Math.abs(k) <= 1 ? 0.22 : 0.1,
              homingT: BOSS_HOMING_SEC,
            });
          }
        }
      }

      function ensureBossVents() {
        while (vents.length < 2) {
          vents.push({
            x: 60 + Math.random() * (W - 120),
            y: zoneY.bot - 8,
            warn: 0,
            fireT: 0,
            cd: 0.8,
          });
        }
      }

      function miniBossAttack(e) {
        e.spin = (e.spin || 0) + 0.35;
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        for (let k = -2; k <= 2; k++) {
          const a = ang + k * 0.14;
          enemyBullets.push({
            x: e.x,
            y: e.y + 6,
            vx: Math.cos(a) * 165,
            vy: Math.sin(a) * 165,
            r: 4.5,
            glow: true,
          });
        }
      }

      function ensureVents() {
        if (time < 40 || bossSpawned) return;
        const want = Math.min(3, 1 + Math.floor((time - 40) / 35));
        while (vents.length < want) {
          vents.push({
            x: 50 + Math.random() * (W - 100),
            y: zoneY.bot - 8,
            warn: 0,
            fireT: 0,
            cd: 2 + Math.random() * 2,
          });
        }
      }

      function triggerVentBurst() {
        for (const v of vents) {
          v.warn = 1.8;
          v.cd = 0.5;
        }
      }

      function updateVents(dt) {
        ensureVents();
        for (const v of vents) {
          v.cd -= dt;
          if (v.warn > 0) {
            v.warn -= dt;
            if (v.warn <= 0) {
              v.fireT = 1.1;
              v.cd = 5 + Math.random() * 2;
            }
          } else           if (v.fireT > 0) {
            v.fireT -= dt;
            const h = 110;
            if (
              Math.abs(player.x - v.x) < 14 &&
              player.y > v.y - h &&
              player.y < v.y + 8 &&
              invuln <= 0
            ) {
              hitPlayer();
            }
          } else if (v.cd <= 0) {
            v.warn = 2.4;
          }
        }
      }

      function spawnFrostCrack(x, y) {
        emberPools.push({
          x,
          y,
          age: 0,
          warnDur: 1.2,
          eruptDur: 0.5,
          coolDur: 1.3,
          hitOnce: false,
          seed: Math.random() * 100,
        });
      }

      function frostTotalLife(p) {
        return p.warnDur + p.eruptDur + p.coolDur;
      }

      function frostPhase(p) {
        if (p.age < p.warnDur) return "warn";
        if (p.age < p.warnDur + p.eruptDur) return "erupt";
        if (p.age < frostTotalLife(p)) return "cool";
        return "done";
      }

      function updateEmberPools(dt) {
        for (const p of emberPools) {
          p.age += dt;
          const phase = frostPhase(p);
          if (phase === "erupt" && !p.hitOnce && invuln <= 0) {
            const t = (p.age - p.warnDur) / p.eruptDur;
            const hitR = 7 + Math.sin(t * Math.PI) * 9;
            const cy = p.y - 32 * t;
            if (Math.hypot(player.x - p.x, player.y - cy) < hitR) {
              p.hitOnce = true;
              hitPlayer();
            }
          }
        }
        for (let i = emberPools.length - 1; i >= 0; i--) {
          if (frostPhase(emberPools[i]) === "done") emberPools.splice(i, 1);
        }
      }

      function enemyAttack(e) {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        if (e.kind === "magma_grunt") {
          for (let k = -1; k <= 1; k++) {
            enemyBullets.push({
              x: e.x,
              y: e.y + e.h * 0.2,
              vx: k * 32,
              vy: 150,
              r: 4,
            });
          }
        } else if (e.kind === "storm") {
          telegraphs.push({ x: e.x, y: e.y + 20, r: 6, maxR: 36, life: 0.35, color: "#c080ff" });
          for (let k = -1; k <= 1; k++) {
            const a = ang + k * 0.12;
            enemyBullets.push({
              x: e.x,
              y: e.y + 5,
              vx: Math.cos(a) * 200,
              vy: Math.sin(a) * 200,
              r: 3.5,
              glow: true,
            });
          }
        } else if (e.kind === "ember_drone") {
          const tx = player.x + (Math.random() - 0.5) * 36;
          const footY = player.y + player.h * 0.45;
          const ty = Math.min(
            zoneY.botEnd - 10,
            Math.max(zoneY.bot + 16, footY),
          );
          spawnFrostCrack(tx, ty);
          enemyBullets.push({
            x: e.x,
            y: e.y,
            vx: Math.cos(ang) * 120,
            vy: Math.sin(ang) * 120,
            r: 5,
            glow: true,
          });
        } else if (e.kind === "ember_bit") {
          enemyBullets.push({
            x: e.x,
            y: e.y,
            vx: Math.cos(ang) * 160,
            vy: Math.sin(ang) * 160,
            r: 3,
          });
        } else if (e.kind === "splitter") {
          for (let k = -1; k <= 1; k++) {
            enemyBullets.push({
              x: e.x,
              y: e.y + 4,
              vx: k * 42,
              vy: 140,
              r: 4,
            });
          }
        } else if (e.kind === "harpy") {
          for (let k = -2; k <= 2; k++) {
            const a = ang + k * 0.1;
            enemyBullets.push({
              x: e.x,
              y: e.y,
              vx: Math.cos(a) * 175,
              vy: Math.sin(a) * 175,
              r: 3.5,
            });
          }
        } else if (e.kind === "warden2") {
          for (let k = -1; k <= 1; k++) {
            const a = ang + k * 0.16;
            enemyBullets.push({
              x: e.x,
              y: e.y + 4,
              vx: Math.cos(a) * 150,
              vy: Math.sin(a) * 150,
              r: 4,
            });
          }
        }
      }

      function hpRageFireCd(e) {
        const phase = bossHpPhase(e);
        if (phase === 3) return 0.32;
        if (phase === 2) return 0.4;
        return 0.52;
      }

      function circleHit(ax, ay, ar, bx, by, br) {
        const dx = ax - bx;
        const dy = ay - by;
        const r = ar + br;
        return dx * dx + dy * dy < r * r;
      }

      function rectCircleHit(rx, ry, rw, rh, cx, cy, cr) {
        const nx = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
        const ny = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
        const dx = cx - nx;
        const dy = cy - ny;
        return dx * dx + dy * dy < cr * cr;
      }

      function update(dt) {
        if (!running || gameOver) return;

        if (victorySeq) {
          updateVictory(dt);
          return;
        }

        time += dt;
        invuln = Math.max(0, invuln - dt);
        flash = Math.max(0, flash - dt);
        shieldVisualT = Math.max(0, shieldVisualT - dt);
        ultActiveT = Math.max(0, ultActiveT - dt);
        if (ultActiveT <= 0) updateHudButtons();

        if (bossSpawned && enemies.some((e) => e.kind === "boss")) {
          bossOrbCd -= dt;
          if (bossOrbCd <= 0 && powerOrbs.length < 2) {
            bossOrbCd = 7;
            const boss = enemies.find((e) => e.kind === "boss");
            if (boss) {
              const drops = ["energy", "power", "spread", "laser", "shield", "missile"];
              spawnPowerOrb(
                boss.x + (Math.random() - 0.5) * 60,
                boss.y + 20,
                drops[Math.floor(Math.random() * drops.length)],
              );
            }
          }
        }

        if (!bossSpawned && !bossTestMode && time >= STAGE3_BOSS_AT) {
          spawnBossNow();
        }
        if (!miniBossSpawned && !bossSpawned && !bossTestMode && time >= STAGE3_MINIBOSS_AT) {
          spawnMiniBossNow();
        }

        updateVents(dt);
        updateEmberPools(dt);
        if (ashOverlayT > 0) ashOverlayT -= dt;

        if (isPlayerCamping()) campTime += dt;
        else campTime = Math.max(0, campTime - dt * 1.5);

        for (let i = pendingSpawns.length - 1; i >= 0; i--) {
          pendingSpawns[i].warn -= dt;
          if (pendingSpawns[i].warn <= 0) {
            spawnEnemyAt(pendingSpawns[i]);
            pendingSpawns.splice(i, 1);
          }
        }

        spawnCdSky -= dt;
        spawnCdMid -= dt;

        if (
          spawnCdSky <= 0 &&
          countPendingInZone("sky") < 2 &&
          !bossSpawned &&
          countEnemiesInZone("sky") < maxSkyEnemies()
        ) {
          spawnCdSky = skySpawnRate();
          queueSpawnSky();
          if (
            countEnemiesInZone("sky") + countPendingInZone("sky") < maxSkyEnemies() &&
            Math.random() < 0.22
          ) {
            queueSpawnSky();
          }
        }

        if (
          spawnCdMid <= 0 &&
          countPendingInZone("mid") < 4 &&
          !bossSpawned &&
          countEnemiesInZone("mid") < maxMidEnemies()
        ) {
          spawnCdMid = spawnRate();
          if (campTime > 2.5 && Math.random() < 0.4) {
            queueSpawnMid("harpy");
          } else {
            queueSpawnMid();
          }
          const midTotal = countEnemiesInZone("mid") + countPendingInZone("mid");
          if (midTotal < maxMidEnemies() && Math.random() < 0.28) {
            queueSpawnMid();
          }
        }

        fireCd -= dt;
        const bombing = bombOrbs.some((b) => b.active);
        if (fireCd <= 0 && !bombing) {
          if (weapon !== "laser" || ultActiveT > 0) {
            fireCd = ultActiveT > 0 ? 0.06 : weapon === "spread" ? 0.14 : 0.09;
            firePlayer();
          }
        }

        if (weapon === "laser" && ultActiveT <= 0 && !bombing) {
          updatePlayerLaser(dt);
        } else {
          playerLaser = null;
        }

        updateMissileLaserTracks(dt);

        if (missileAssistT > 0) {
          missileAssistT -= dt;
          if (weapon !== "laser") {
            missileCd -= dt;
            if (missileCd <= 0 && !bombing) {
              missileCd = MISSILE_FIRE_INTERVAL;
              fireMissileAssist();
            }
          }
          if (missileAssistT <= 0) {
            clearMissileAssist();
            updateHud();
          } else updateHudButtons();
        }

        for (const orb of powerOrbs) {
          orb.life -= dt;
          orb.wobble += dt * 5;
          orb.y += orb.vy * dt;
          orb.x += Math.sin(orb.wobble) * 12 * dt;
          const dx = player.x - orb.x;
          const dy = player.y - orb.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 70) {
            orb.x += dx * 2.8 * dt;
            orb.y += dy * 2.8 * dt;
          }
          if (dist < 24) {
            collectPickup(orb.type);
            orb._gone = true;
          }
        }
        for (let i = powerOrbs.length - 1; i >= 0; i--) {
          if (powerOrbs[i]._gone || powerOrbs[i].life <= 0 || powerOrbs[i].y > zoneY.botEnd) {
            powerOrbs.splice(i, 1);
          }
        }

        for (const orb of bombOrbs) {
          if (!orb.active) continue;
          if (orb.phase === "launch") {
            orb.x += orb.vx * dt;
            orb.y += orb.vy * dt;
            orb.vy += 520 * dt;
            if (orb.vy >= 30) {
              orb.phase = "fall";
              orb.vy = 90;
            }
          } else if (orb.phase === "fall") {
            orb.wobble += dt * 8;
            orb.x += Math.sin(orb.wobble) * 18 * dt;
            orb.y += orb.vy * dt;
            orb.vy = Math.min(orb.vy + 180 * dt, 220);
            if (orb.y >= orb.targetY) burstBomb(orb);
          }
        }
        for (let i = bombOrbs.length - 1; i >= 0; i--) {
          if (!bombOrbs[i].active) bombOrbs.splice(i, 1);
        }

        for (const t of telegraphs) {
          t.life -= dt;
          t.r += (t.maxR - t.r) * dt * 6;
        }
        for (let i = telegraphs.length - 1; i >= 0; i--) {
          if (telegraphs[i].life <= 0) telegraphs.splice(i, 1);
        }

        for (const b of bullets) {
          if (b.homing) {
            let nearest = null;
            let best = Infinity;
            for (const e of enemies) {
              const d = (e.x - b.x) ** 2 + (e.y - b.y) ** 2;
              if (d < best) {
                best = d;
                nearest = e;
              }
            }
            if (nearest) {
              const ang = Math.atan2(nearest.y - b.y, nearest.x - b.x);
              const cur = Math.atan2(b.vy, b.vx);
              let diff = ang - cur;
              while (diff > Math.PI) diff -= Math.PI * 2;
              while (diff < -Math.PI) diff += Math.PI * 2;
              const sp = Math.hypot(b.vx, b.vy);
              const na = cur + diff * b.homing;
              b.vx = Math.cos(na) * sp;
              b.vy = Math.sin(na) * sp;
            }
          }
          if (b.life != null) b.life -= dt;
          b.trail.push({ x: b.x, y: b.y });
          if (b.trail.length > (b.bombShard ? 6 : 4)) b.trail.shift();
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.bombShard) {
            b.vx *= 0.985;
            b.vy *= 0.985;
          }
        }
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.y < -40 || b.y > zoneY.botEnd + 30) bullets.splice(i, 1);
          else if (b.life != null && b.life <= 0) bullets.splice(i, 1);
        }

        for (const e of enemies) {
          if (e.dying) {
            e.dyingT -= dt;
            if (e.dyingT <= 0) e._dyingDone = true;
            continue;
          }
          if (e.spawnShield > 0) e.spawnShield -= dt;

          if (e.kind !== "boss" && e.kind !== "miniboss") {
            if (e.movePhase === "drop") {
              e.y += e.dropVy * dt;
              e.x += (e.vx ?? e.speed * 0.35) * dt;
              if (e.y >= e.cruiseY) {
                e.y = e.cruiseY;
                e.movePhase = "cruise";
              }
            } else {
              e.x += (e.vx ?? e.speed) * dt;
              if (e.cruiseVy) e.y += e.cruiseVy * dt;
              if (enemyZone(e) === "sky") {
                e.wobble = (e.wobble || 0) + dt * 5;
                e.y += Math.sin(e.wobble) * 20 * dt;
                e.y = Math.max(20, Math.min(zoneY.mid - 24, e.y));
              } else if (e.kind === "harpy" && e.divePhase === "dive") {
                e.y += 140 * dt;
                if (e.y > zoneY.bot - 20) e.divePhase = "pull";
              } else if (e.kind === "harpy" && e.divePhase === "pull") {
                e.y -= 90 * dt;
                if (e.y < e.cruiseY) {
                  e.y = e.cruiseY;
                  e.divePhase = "cruise";
                }
              }
            }
          } else {
            e.x += e.speed * dt * (e.bossDir || 1);
            if (e.x > W * 0.58) e.bossDir = -1;
            else if (e.x < W * 0.22) e.bossDir = 1;
          }

          const offField =
            e.x < -40 ||
            e.x > W + 40 ||
            e.y > zoneY.botEnd + 30 ||
            (enemyZone(e) === "sky" && e.y > zoneY.mid + 8);
          if (offField) {
            if (e.kind !== "boss") {
              escaped += 1;
              score = Math.max(0, score - 1);
              updateHud();
            }
            e._dead = true;
          }

          e.fireCd -= dt;
          const inSkyFire = enemyZone(e) === "sky" && e.y < zoneY.mid - 10;
          const inMidFire = enemyZone(e) === "mid" && e.y > zoneY.mid + 12 && e.y < zoneY.bot + 8;
          const inBossFire = e.kind === "boss" || e.kind === "miniboss";
          if (
            e.fireCd <= 0 &&
            e.spawnShield <= 0 &&
            e.x > 24 &&
            e.x < W - 24 &&
            (inBossFire || inSkyFire || inMidFire)
          ) {
            if (e.kind === "boss") {
              e.fireCd = hpRageFireCd(e);
              bossAttack(e);
            } else if (e.kind === "miniboss") {
              e.fireCd = 0.9 + Math.random() * 0.5;
              miniBossAttack(e);
            } else {
              e.fireCd =
                e.kind === "storm"
                  ? 0.55 + Math.random() * 0.35
                  : e.kind === "ember_drone"
                    ? 1.2 + Math.random() * 0.6
                    : e.kind === "harpy"
                      ? 1.1 + Math.random() * 0.65
                      : e.kind === "splitter"
                        ? 1.2 + Math.random() * 0.7
                        : e.kind === "warden2"
                          ? 1.1 + Math.random() * 0.65
                          : e.kind === "ember_bit"
                            ? 1.4 + Math.random() * 0.6
                            : 1.2 + Math.random() * 0.8;
              if (e.kind === "harpy" && e.divePhase === "cruise" && Math.random() < 0.22) {
                e.divePhase = "dive";
                e.cruiseY = e.y;
              }
              enemyAttack(e);
            }
          }
        }
        for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i]._dyingDone) killEnemy(enemies[i], i);
          else if (enemies[i]._dead) enemies.splice(i, 1);
        }

        for (const eb of enemyBullets) {
          if (eb.homing > 0 && eb.homingT > 0) {
            eb.homingT -= dt;
            const ang = Math.atan2(player.y - eb.y, player.x - eb.x);
            const cur = Math.atan2(eb.vy, eb.vx);
            let diff = ang - cur;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const sp = Math.hypot(eb.vx, eb.vy);
            const na = cur + diff * eb.homing;
            eb.vx = Math.cos(na) * sp;
            eb.vy = Math.sin(na) * sp;
            if (eb.homingT <= 0) eb.homing = 0;
          }
          eb.x += eb.vx * dt;
          eb.y += eb.vy * dt;
        }
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const eb = enemyBullets[i];
          if (eb.y > zoneY.botEnd + 20 || eb.x < -20 || eb.x > W + 20) {
            enemyBullets.splice(i, 1);
            continue;
          }
          if (circleHit(eb.x, eb.y, eb.r, player.x, player.y, PLAYER_HIT_R)) {
            enemyBullets.splice(i, 1);
            hitPlayer();
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          let hit = false;
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (e.spawnShield > 0 && !b.bombShard) continue;
            if (rectCircleHit(e.x, e.y, e.w, e.h, b.x, b.y, b.r)) {
              e.hp -= b.dmg;
              hit = true;
              if (e.kind === "boss" && e.hp > 0 && Math.random() < 0.2) {
                spawnPowerOrb(e.x + (Math.random() - 0.5) * 36, e.y + 14, "energy");
              }
              if (e.hp <= 0) killEnemy(e, j);
              break;
            }
          }
          if (hit) bullets.splice(i, 1);
        }

        updateParticles(dt);
        if (victorySeq) updateVictory(dt);
      }

      function drawFortressIceLayer() {
        const midH = zoneY.bot - zoneY.mid;
        const wallL = W * 0.17;
        const wallR = W * 0.83;

        // 中央通道冷光
        const pathGrad = ctx.createLinearGradient(wallL, 0, wallR, 0);
        pathGrad.addColorStop(0, "rgba(0,0,0,0.4)");
        pathGrad.addColorStop(0.2, "rgba(100, 180, 255, 0.05)");
        pathGrad.addColorStop(0.5, "rgba(160, 220, 255, 0.12)");
        pathGrad.addColorStop(0.8, "rgba(100, 180, 255, 0.05)");
        pathGrad.addColorStop(1, "rgba(0,0,0,0.4)");
        ctx.fillStyle = pathGrad;
        ctx.fillRect(wallL, zoneY.mid, wallR - wallL, midH);

        // 左冰牆要塞
        const iceL = ctx.createLinearGradient(0, zoneY.mid, wallL, zoneY.bot);
        iceL.addColorStop(0, "#1a2838");
        iceL.addColorStop(0.5, "#243448");
        iceL.addColorStop(1, "#142030");
        ctx.fillStyle = iceL;
        ctx.beginPath();
        ctx.moveTo(0, zoneY.mid);
        ctx.lineTo(wallL, zoneY.mid);
        ctx.lineTo(wallL + 4, zoneY.mid + midH * 0.2);
        ctx.lineTo(wallL - 6, zoneY.mid + midH * 0.42);
        ctx.lineTo(wallL + 2, zoneY.mid + midH * 0.65);
        ctx.lineTo(wallL - 8, zoneY.bot);
        ctx.lineTo(0, zoneY.bot);
        ctx.closePath();
        ctx.fill();

        // 左城垛塔樓
        for (let t = 0; t < 3; t++) {
          const tx = wallL - 14 - t * 6;
          const ty = zoneY.mid + midH * (0.12 + t * 0.28);
          ctx.fillStyle = "#2a3a50";
          ctx.fillRect(tx, ty, 12, 22 + (t % 2) * 8);
          ctx.fillStyle = "rgba(120, 200, 255, 0.35)";
          ctx.fillRect(tx + 3, ty + 4, 4, 4);
          ctx.fillStyle = "rgba(200, 230, 255, 0.5)";
          ctx.fillRect(tx + 1, ty - 2, 10, 3);
        }

        // 右冰牆要塞
        const iceR = ctx.createLinearGradient(wallR, zoneY.mid, W, zoneY.bot);
        iceR.addColorStop(0, "#1a2838");
        iceR.addColorStop(0.5, "#243448");
        iceR.addColorStop(1, "#142030");
        ctx.fillStyle = iceR;
        ctx.beginPath();
        ctx.moveTo(W, zoneY.mid);
        ctx.lineTo(wallR, zoneY.mid);
        ctx.lineTo(wallR - 4, zoneY.mid + midH * 0.18);
        ctx.lineTo(wallR + 6, zoneY.mid + midH * 0.4);
        ctx.lineTo(wallR - 2, zoneY.mid + midH * 0.68);
        ctx.lineTo(wallR + 8, zoneY.bot);
        ctx.lineTo(W, zoneY.bot);
        ctx.closePath();
        ctx.fill();

        for (let t = 0; t < 3; t++) {
          const tx = wallR + 2 + t * 6;
          const ty = zoneY.mid + midH * (0.15 + t * 0.27);
          ctx.fillStyle = "#2a3a50";
          ctx.fillRect(tx, ty, 12, 20 + (t % 2) * 10);
          ctx.fillStyle = "rgba(120, 200, 255, 0.35)";
          ctx.fillRect(tx + 5, ty + 4, 4, 4);
          ctx.fillStyle = "rgba(200, 230, 255, 0.5)";
          ctx.fillRect(tx + 1, ty - 2, 10, 3);
        }

        // 冰橋拱門
        ctx.strokeStyle = "rgba(140, 200, 240, 0.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(wallL + 8, zoneY.mid + midH * 0.55);
        ctx.quadraticCurveTo(W / 2, zoneY.mid + midH * 0.38, wallR - 8, zoneY.mid + midH * 0.55);
        ctx.stroke();

        // 冰層紋理
        ctx.strokeStyle = "rgba(180, 220, 255, 0.2)";
        ctx.lineWidth = 1;
        for (let side = -1; side <= 1; side += 2) {
          const base = side < 0 ? wallL : wallR;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const ly = zoneY.mid + midH * (0.15 + i * 0.13);
            const lx = base + side * (6 + i * 2);
            if (i === 0) ctx.moveTo(lx, ly);
            else ctx.lineTo(lx, ly);
          }
          ctx.stroke();
        }

        // 底部碎冰河
        const iceRiverY = zoneY.mid + midH * 0.8;
        const pulse = 0.88 + Math.sin(time * 2.8) * 0.12;
        const rw = W * 0.24 * pulse;
        const rg = ctx.createLinearGradient(W / 2 - rw, iceRiverY, W / 2 + rw, iceRiverY);
        rg.addColorStop(0, "rgba(40, 80, 120, 0)");
        rg.addColorStop(0.35, "rgba(120, 200, 255, 0.35)");
        rg.addColorStop(0.5, "rgba(200, 240, 255, 0.65)");
        rg.addColorStop(0.65, "rgba(120, 200, 255, 0.35)");
        rg.addColorStop(1, "rgba(40, 80, 120, 0)");
        ctx.fillStyle = rg;
        ctx.fillRect(W / 2 - rw, iceRiverY - 5, rw * 2, 12);
        ctx.fillStyle = `rgba(220, 245, 255, ${0.2 + Math.sin(time * 4) * 0.08})`;
        ctx.fillRect(W / 2 - rw * 0.5, iceRiverY - 1, rw, 3);

        // 探照燈（裝飾掃射）
        for (let s = 0; s < 2; s++) {
          const originX = s === 0 ? wallL + 6 : wallR - 6;
          const originY = zoneY.mid + midH * 0.22;
          const sweep = Math.sin(time * 0.9 + s * 1.7) * 0.55 + (s === 0 ? -0.25 : 0.25);
          const beamLen = midH * 0.72;
          const endX = originX + Math.sin(sweep) * beamLen * 0.85;
          const endY = originY + Math.cos(sweep) * beamLen * 0.35 + beamLen * 0.45;
          const bg = ctx.createLinearGradient(originX, originY, endX, endY);
          bg.addColorStop(0, "rgba(200, 230, 255, 0.22)");
          bg.addColorStop(0.6, "rgba(140, 200, 255, 0.06)");
          bg.addColorStop(1, "rgba(100, 180, 255, 0)");
          ctx.fillStyle = bg;
          ctx.beginPath();
          ctx.moveTo(originX, originY);
          ctx.lineTo(endX - 18, endY);
          ctx.lineTo(endX + 18, endY);
          ctx.closePath();
          ctx.fill();
        }

        // 飄雪冰屑
        for (let i = 0; i < 18; i++) {
          const fx = ((time * 14 + i * 53) % (W + 50)) - 25;
          const fy = zoneY.mid + ((time * 11 + i * 37) % (midH * 0.9));
          const sz = 0.8 + (i % 3) * 0.6;
          ctx.globalAlpha = 0.2 + (i % 4) * 0.1;
          ctx.fillStyle = i % 3 === 0 ? "#d8f0ff" : "#a8d0f0";
          ctx.beginPath();
          ctx.arc(fx, fy, sz, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawSkyAuroraFortress() {
        // 極光帶
        for (let band = 0; band < 3; band++) {
          const ay = zoneY.mid * (0.15 + band * 0.22);
          const wave = Math.sin(time * 1.2 + band) * W * 0.08;
          const ag = ctx.createLinearGradient(0, ay - 20, 0, ay + 30);
          const hues = ["rgba(80, 220, 160, ", "rgba(100, 180, 255, ", "rgba(180, 120, 255, "];
          ag.addColorStop(0, hues[band] + "0)");
          ag.addColorStop(0.5, hues[band] + `${0.12 + Math.sin(time * 2 + band) * 0.05})`);
          ag.addColorStop(1, hues[band] + "0)");
          ctx.fillStyle = ag;
          ctx.fillRect(wave, ay - 20, W, 50);
        }

        // 遠方要塞剪影
        const fortX = W * 0.5 + Math.sin(time * 0.35) * 12;
        const fortTop = zoneY.mid * 0.18;
        ctx.fillStyle = "#0e1828";
        ctx.beginPath();
        ctx.moveTo(fortX - 70, zoneY.mid);
        ctx.lineTo(fortX - 50, fortTop + 30);
        ctx.lineTo(fortX - 20, fortTop);
        ctx.lineTo(fortX, fortTop + 12);
        ctx.lineTo(fortX + 20, fortTop);
        ctx.lineTo(fortX + 50, fortTop + 30);
        ctx.lineTo(fortX + 70, zoneY.mid);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "rgba(100, 180, 255, 0.25)";
        for (let w = -2; w <= 2; w++) {
          ctx.fillRect(fortX + w * 18 - 3, fortTop + 20 + (w % 2) * 8, 6, 5);
        }

        // 寒星
        for (let i = 0; i < 20; i++) {
          const sx = (i * 97 + 13) % W;
          const sy = (i * 43 + 7) % (zoneY.mid * 0.85);
          const tw = 0.4 + Math.abs(Math.sin(time * 3 + i)) * 0.6;
          ctx.globalAlpha = tw;
          ctx.fillStyle = "#e8f4ff";
          ctx.beginPath();
          ctx.arc(sx, sy, 0.8 + (i % 2), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawBg() {
        const grdTop = ctx.createLinearGradient(0, 0, 0, zoneY.mid);
        grdTop.addColorStop(0, "#060c18");
        grdTop.addColorStop(1, "#142030");
        ctx.fillStyle = grdTop;
        ctx.fillRect(0, 0, W, zoneY.mid);

        drawSkyAuroraFortress();

        const skyIce = ctx.createLinearGradient(0, 0, 0, zoneY.mid);
